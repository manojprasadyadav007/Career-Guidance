<div class="container-fluid new-design">

<!-- Content Row -->
<div class="row">

<div class="card shadow">
    <div class="card-body perfect-scrollbar-on" style="overflow-y: scroll;">
        <!-- <h4 class="card-title color-333">News and Announcements</h4> -->
        <div class="cardtitle">News and Announcements</div>
        <ng-container  *ngFor="let item of newsList">
            <div class="d-flex justify-content-between">
                <div class="flex-grow-1">
                    <p class="card-title">
                        <a (click)="view(item)" class="link" >{{item.NewsSubject}}</a></p>
                </div>
                <div style="margin-top: 6px;">                    
                    <p class="card-subtitle">{{item.AddStamp | utcToLocaltime:'DD MMM YYYY h:mm A'}}</p>                
                </div>
            </div>
            <hr/>
        </ng-container>

        <ng-container *ngIf="newsList?.length <= 0">
            <div style="position: absolute;top: 50%;left: 50%;-moz-transform: translateX(-50%) translateY(-50%);-webkit-transform: translateX(-50%) translateY(-50%);
            transform: translateX(-50%) translateY(-50%);"> 
            <p>No data</p>
            </div>
        </ng-container>
       
    </div>
</div>

</div>

</div>
