<div class="container-fluid">
<div class="row">

    <div class="col-12 col-md-6 mb-4">
        <div class="card card-chart h-100">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-12">
                        <mat-form-field>
                            <mat-label>Application Intake</mat-label>
                            <mat-select placeholder="application Intake" [(ngModel)]="intakeitem"
                                (selectionChange)="changeIntake()">
                                <mat-option>
                                    <ngx-mat-select-search [(ngModel)]="appFilter" [placeholderLabel]="'Search...'"
                                        [noEntriesFoundLabel]="'Not found'" name="appFilter"></ngx-mat-select-search>
                                </mat-option>
                                <mat-option [value]="item.IntakeName"
                                    *ngFor="let item of inTakeList | stringFilterBy:appFilter:'IntakeName'">{{item.IntakeName}}
                                </mat-option>
                            </mat-select>
                        </mat-form-field>
                    </div>
                </div>
                <div class="row ">
                    <div class="col-md-12">
                        <dx-funnel id="funnel" [dataSource]="listData" argumentField="StatusName" valueField="ApplicationCount"
                            palette="Soft Pastel" (onItemClick)="onItemClick($event)">
                            <dxo-title text="Application Intake">
                                <dxo-margin [bottom]="30"></dxo-margin>
                            </dxo-title>
                            <dxo-tooltip [enabled]="true" [format]="fixedPoint" color="#fff" [font]="{'color': 'black'}">
                            </dxo-tooltip>
                            <dxo-item>
                                <dxo-border [visible]="true">
                                </dxo-border>
                            </dxo-item>
                            <dxo-label [visible]="true" position="inside" backgroundColor="none"
                                [customizeText]="customizeText">
                                <dxo-font [size]="16"></dxo-font>
                            </dxo-label>
                        </dx-funnel>

                    </div>
                    <!-- <div *ngIf="listData.length<0">
        No data available 
        </div> -->

                </div>
            </div>    
        </div>
    </div>



    <div class="col-12 col-md-6 mb-4">
        <div class="card card-chart h-100">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-12">
                        &nbsp;
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
</div>
