
   <div class="container">
       <div class="row">
        <div *ngFor="let item of data" class="col-lg-3 col-md-6 col-sm-6">
            <div class="card card-stats">
                <div class="card-header card-header-{{item.color || 'success'}} card-header-icon">
                    <div class="card-icon">
                        <mat-icon>{{item.icon || 'content_copy'}}</mat-icon>
                    </div>
                    <p class="card-category">{{item.Name}}</p>
                    <h3 class="card-title"  *ngIf="item.link" >
                        <a class="link"  href="#/member/{{item.link}}"   > {{item.NoOfItem}}</a>
                    </h3>
                    <h3 class="card-title" *ngIf="!item.link">
                         {{item.NoOfItem}} 
                    </h3>
                </div>
                <!-- <div class="card-footer">
                    <div class="stats" *ngIf="item.link">
                        <a href="#/member/{{item.link}}">View</a>
                    </div>
                </div> -->
            </div>
        </div>
       </div>
   </div>
