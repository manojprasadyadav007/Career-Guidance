

<div  class="new-design" >
    <div mat-dialog-title>
      {{title}}  
      <button class="close text-white" type="button" mat-dialog-close aria-label="Close">
        <span aria-hidden="true">×</span>
      </button>
    </div>
    <div mat-dialog-content>
       <div class="main-content">
        <div class="card">
            <div class="card-body">
    
                <dx-data-grid [dataSource]="studentgrowthList?.data" [showBorders]="true" [allowColumnResizing]="true"
                    [showColumnLines]="true" [showRowLines]="true" [rowAlternationEnabled]="true" [noDataText]="gridMessage" 
                    [columnAutoWidth]="true"  (onToolbarPreparing)="onToolbarPreparing($event)" [allowColumnReordering]="true"
                    >
    
                    <dxo-filter-panel [visible]="true"></dxo-filter-panel>
    
                    <dxo-paging [enabled]="true" [pageSize]="10"></dxo-paging>
                    <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[5, 10, 25,50,100]" [showInfo]="true">
                    </dxo-pager>
                    <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>
    
                    <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>
    
                    <dxo-export [enabled]="excel_permisson > 0" fileName="Campaigns"></dxo-export>
    
                    <dxo-column-chooser [enabled]="true" mode="select" [allowSearch]="true">
                    </dxo-column-chooser>
    
                    <!-- <dxo-scrolling mode="virtual"></dxo-scrolling> -->
    
                    <dxi-column *ngFor="let item of studentgrowthList?.columns" [dataField]="item.columnDef" 
                        [caption]="item.header" [dataType]="item.type" [format]="item.format">
                    </dxi-column>
    
                    <!-- <dxi-column caption="Action" [allowExporting]="false" [fixed]="true" fixedPosition="right" [minWidth]="50" cellTemplate="actionCellTemplate"
                   >
                    </dxi-column> -->
    
                        <!-- <a href="#/member/campaigns/edit/{{d.data.CampaignId}}" mat-icon-button class="text-info">
                            <mat-icon>edit</mat-icon>
                        </a> -->
    
                        <dxo-summary *ngIf="studentgrowthList?.data?.length>0">
                            <ng-container *ngFor=" let item of studentgrowthList?.columns">
                                    <dxi-total-item *ngIf="item?.isTotal" [column]="item.columnDef"
                                    summaryType="sum"  displayFormat="Sum: {0}">  </dxi-total-item>
                        </ng-container>
                    </dxo-summary>
    
                    <div *dxTemplate="let d of 'toolbarButton'">
    
                        <!-- <button class="text-danger" (click)="add()" mat-icon-button  data-toggle="tooltip" title="New">
                            <mat-icon>add</mat-icon>
                        </button> -->
    
                        <button class="text-danger" (click)="showFilterRow=!showFilterRow" mat-icon-button data-toggle="tooltip" title="Apply Filter" data-toggle="tooltip" title="Apply Filter">
                            <mat-icon>filter_list</mat-icon>
                        </button>
                    </div>
    
    
                </dx-data-grid>
    
    
            </div>
        </div>
    </div>
    
    <!-- Script For Tooltip -->
    <script>
        $(document).ready(function () {
            $('[data-toggle="tooltip"]').tooltip();
        });
    </script>
    </div>
    <div mat-dialog-actions align="center">
        <button type="button" mat-dialog-close class="btn btn-sm btn-primary modalclose">
          Close
        </button>
</div>
