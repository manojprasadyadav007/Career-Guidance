<form #updateform="ngForm"  form>
   <div class="row">
     <div class="col-md-12">
        <mat-form-field>
          <!-- <mat-label>{{remarkLabel}}</mat-label> -->
            <textarea matInput [placeholder]="remarkLabel" rows="3" #Remark="ngModel" [(ngModel)]="formdata.Remark" name="Remark"
              [required]="remarkRequired" [pattern]="modelPattern.alphaNumericWithSpecialCharacters"></textarea>
              <mat-error *ngIf="Remark.hasError('pattern')">Enter valid {{remarkLabel_error}}</mat-error>

          </mat-form-field>
     </div>
     <div class="col-md-3  pull-left">
            <mat-form-field *ngIf="showStatusDropDown">
              <mat-label>Status</mat-label>
                <mat-select matInput placeholder="Status" #StatusId="ngModel" [(ngModel)]="formdata.StatusId" name="StatusId"
                  required >
                  <mat-option>
                    <ngx-mat-select-search [(ngModel)]="statusFilter" [placeholderLabel]="'Search...'"
                      [noEntriesFoundLabel]="'Not found'" name="statusFilter"></ngx-mat-select-search>
                  </mat-option>
                  <mat-option value="">Select</mat-option>
                  <mat-option *ngFor="let item of selectList | stringFilterBy:statusFilter:'StatusName';  trackByProperty: 'StatusId'" [value]="item.StatusId" >{{item.StatusName}}</mat-option>
                </mat-select>
              </mat-form-field>
     </div>
     <div class="col-md-3 pull-left" >
      <mat-form-field *ngIf="showPrioirtyDropDown">
        <mat-label>Priority</mat-label>
        <mat-select matInput placeholder="Priority" #Priority="ngModel" [(ngModel)]="formdata.Priority" name="Priority"
          [required]="showPrioirtyDropDown" [pattern]="modelPattern.dropDownNumericValueWith0" >
          <mat-option value="">Select</mat-option>
          <mat-option value="0">Low</mat-option>
          <mat-option value="1">Medium</mat-option>
          <mat-option value="2">High</mat-option>
        </mat-select>
      </mat-form-field>
     </div>
     <div class="col-md-6">
       <div class=" pull-left">
          <button mat-raised-button class="btn btn-sm btn-danger" type="button" (click)="formSubmit(updateform)" [disabled]="!updateform.valid" >{{btnLable}}</button>
       </div>
       
     </div>
   </div>
</form>
