<div class="main-content new-design">
  <div class="card">
     <div class="card-body">
      <div class="container-fluid">
        <div class="row">
          <div class="col-6">
            <mat-form-field>
              <mat-label>Role</mat-label>
              <mat-select matInput placeholder="Role" #roleId="ngModel" [(ngModel)]="formdata.roleId" name="roleId" required
                pattern="^[1-9]\d*$" (selectionChange)="getRolePermission()">
                <mat-option>
                  <ngx-mat-select-search [(ngModel)]="roleFilter" [placeholderLabel]="'Search...'"
                    [noEntriesFoundLabel]="'Not found'" name="roleFilter"></ngx-mat-select-search>
                </mat-option>
                <mat-option *ngFor="let role of roleList | stringFilterBy:roleFilter:'RoleName';  trackByProperty: 'RoleId'" [value]="role.RoleId">
                  
                  {{role.RoleName}}</mat-option>
              </mat-select>
              <mat-error *ngIf="roleId.hasError('pattern')">Select Role</mat-error>
            </mat-form-field>
          </div>
          </div>

      <dx-data-grid [dataSource]="dataList" [showBorders]="true" [allowColumnResizing]="true"
    [showColumnLines]="true" [showRowLines]="true" [rowAlternationEnabled]="true" [noDataText]="gridMessage" [columnAutoWidth]="true"
    (onToolbarPreparing)="onToolbarPreparing($event)" [allowColumnReordering]="true"  (onCellPrepared)="onCellPrepared($event)" (onExporting)="activitylog()">
    <dxo-filter-panel [visible]="true" ></dxo-filter-panel>
    <dxo-paging [enabled]="true" [pageSize]="10"></dxo-paging>
    <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[5, 10, 25,50,100]" [showInfo]="true">
    </dxo-pager>

    <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>

    <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>

    <dxo-export [enabled]="excel_permisson > 0" fileName="Role Permission"></dxo-export>

    <dxo-column-chooser [enabled]="true" mode="select" [allowSearch]="true">
    </dxo-column-chooser>

    <dxi-column *ngFor="let item of columns" [dataField]="item.dataField" [minWidth]="100"
        [caption]="item.title | sentenceCase" [dataType]="item.type" [format]="item.format">
    </dxi-column>

    <dxi-column caption="NA" [minWidth]="50" cellTemplate="nACellTemplate">
    </dxi-column>

    <dxi-column caption="RO/Access" [minWidth]="50" cellTemplate="rOCellTemplate">
    </dxi-column>
    
    <dxi-column caption="RW" [minWidth]="50" cellTemplate="rWCellTemplate">
    </dxi-column>
    
    
    <dxi-column caption="FC" [minWidth]="50" cellTemplate="fCCellTemplate">
    </dxi-column>
  
    <div *dxTemplate="let d of 'nACellTemplate'">
      <mat-checkbox [checked]="d.data.Permission===0" [disabled]="d.data.Permission===0"
      (change)="changePermission(d.data,0)">

    </mat-checkbox>
    </div>
 
    <div *dxTemplate="let d of 'rOCellTemplate'">
      <mat-checkbox [checked]="d.data.Permission===1" (change)="changePermission(d.data,1)"
           [disabled]="d.data.Permission===1">
      </mat-checkbox>
    </div>
    
    <div *dxTemplate="let d of 'rWCellTemplate'">
      <mat-checkbox [checked]="d.data.Permission===2" (change)="changePermission(d.data,2)"
          [disabled]="d.data.Permission===2" [hidden]="d.data.MenuType ===1">
    </mat-checkbox>
    </div>

    <div *dxTemplate="let d of 'fCCellTemplate'">
      <mat-checkbox [checked]="d.data.Permission===3" (change)="changePermission(d.data,3)"
      [disabled]="d.data.permission===3" [hidden]="d.data.MenuType ===1">
     </mat-checkbox>
    </div>

    <div *dxTemplate="let d of 'toolbarButton'">
   

        <button class="text-danger" (click)="showFilterRow=!showFilterRow" mat-icon-button data-toggle="tooltip" title="Apply Filter">
            <mat-icon>filter_list</mat-icon>
        </button>

    </div>

</dx-data-grid> 
<button class=" btn btn-sm btn-danger pull-right" (click)="onSubmit()" > Update</button>
