<form class="new-design">

    <div mat-dialog-title>
        Refund Documents
        <button class="close text-white" type="button" aria-label="Close" (click)="cancel()"><span
                aria-hidden="true">×</span></button>
    </div>

    <div mat-dialog-content>

        <app-display-documents [parentId]="parentId" [parentType]="parentType" [permission]="permission"
            [showRemark]="showRemark"   (onDocumentUpload)="uploadedDocument($event)">
        </app-display-documents>
    </div>
</form>
