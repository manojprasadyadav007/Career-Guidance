<form #form="ngForm" (submit)="submitform(form)" class="new-design">
    <div mat-dialog-title>
        Knowledge Category
        <button class="close text-white" type="button" [mat-dialog-close]="isChange" aria-label="Close"><span
                aria-hidden="true">×</span></button>
    </div>
    <div mat-dialog-content>
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-6 col-sm-12" [ngClass]="{'col-md-6 col-sm-12':showForm,'col-md-12':!showForm}">

                    <dx-data-grid [dataSource]="dataList" [showBorders]="true" [allowColumnResizing]="true"
                        [showColumnLines]="true" [showRowLines]="true" [rowAlternationEnabled]="true"
                        [noDataText]="gridMessage" [columnAutoWidth]="true" (onToolbarPreparing)="onToolbarPreparing($event)"
                        [allowColumnReordering]="true" (onRowClick)="edit($event.data.CategoryId)" (onExporting)="activitylog()">

                        <dxo-filter-panel [visible]="true"></dxo-filter-panel>

                        <dxo-paging [enabled]="true" [pageSize]="10"></dxo-paging>
                        <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[5, 10, 25,50,100]"
                            [showInfo]="true">
                        </dxo-pager>

                        <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>

                        <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>

                        <dxo-export [enabled]="excel_permisson > 0" fileName="Knowledge Category"></dxo-export>

                        <dxo-column-chooser [enabled]="true" mode="select" [allowSearch]="true">
                        </dxo-column-chooser>

                        <!-- <dxo-scrolling mode="virtual"></dxo-scrolling> -->

                        <dxi-column *ngFor="let item of columns" [dataField]="item.dataField" [minWidth]="100"
                            [caption]="item.title | sentenceCase" [dataType]="item.type" [format]="item.format">
                        </dxi-column>

                        <dxi-column caption="Action" [allowExporting]="false" [minWidth]="50" cellTemplate="actionCellTemplate"
                            *ngIf="currentUser.RoleId===1" [fixed]="true" fixedPosition="right">

                        </dxi-column>

                        <div *dxTemplate="let d of 'actionCellTemplate'">

                            <button type="button" mat-icon-button class="text-danger"
                                (click)="$event.stopPropagation(); delete(d.data.CategoryId)" data-toggle="tooltip" title="Delete">
                                <mat-icon>close</mat-icon>
                            </button>
                        </div>

                        <div *dxTemplate="let d of 'toolbarButton'">
                            <button type="button" class="text-danger" (click)="add(form)" mat-icon-button
                                *ngIf="currentUser.RoleId===1" data-toggle="tooltip" title="New">
                                <mat-icon>add</mat-icon>
                            </button>

                            <button class="text-danger" (click)="showFilterRow=!showFilterRow" mat-icon-button
                                data-toggle="tooltip" title="Apply Filter">
                                <mat-icon>filter_list</mat-icon>
                            </button>

                        </div>

                    </dx-data-grid>
                </div>
                <div class="col-md-6 col-sm-12" *ngIf="currentUser.RoleId===1" [hidden]="!showForm">
                    <div class="row">
                        <div class="col-md-12">
                            <mat-form-field>
                                <mat-label>Category</mat-label>
                                <input matInput placeholder="Category" type="text" #CategoryName="ngModel"
                                    [(ngModel)]="formdata.CategoryName" name="CategoryName"  required>
                                    <mat-error *ngIf="CategoryName.hasError('required')">Enter category name</mat-error>
                            </mat-form-field>
                        </div>
                        <div class="col-md-12">
                            <mat-form-field>
                                <mat-label>Parent Category</mat-label>
                                <mat-select matInput placeholder="Parent Category" #ParentCategoryId="ngModel"
                                    [(ngModel)]="formdata.ParentCategoryId" name="ParentCategoryId">
                                    <mat-option>
                                        <ngx-mat-select-search [(ngModel)]="categoryFilter"
                                            [placeholderLabel]="'Search...'" [noEntriesFoundLabel]="'Not found'"
                                            name="categoryFilter"></ngx-mat-select-search>
                                    </mat-option>
                                    <mat-option [value]="0">None</mat-option>
                                    <mat-option
                                        *ngFor="let category of categoryList | stringFilterBy:categoryFilter:'CategoryName';  trackByProperty: 'CategoryId'"
                                        [value]="category.CategoryId">{{category.CategoryName}}</mat-option>
                                </mat-select>
                            </mat-form-field>
                        </div>
                    </div>
                    <div align="center">

                        <button type="button" (click)="resetForm()" class="btn btn-sm btn-primary">
                            Cancel
                        </button>
                        <button type="submit" class="btn btn-sm btn-primary btn-cust" *ngIf="currentUser.RoleId===1"
                            [disabled]="flagdisabled" [hidden]="!showForm">
                            {{ formdata.CategoryId ? 'Update' : 'Add' }}
                        </button>
                    </div>
                </div>

            </div>

        </div>
    </div>
    <div mat-dialog-footer align="center">
        <button type="button" [mat-dialog-close]="isChange" class="btn btn-sm  btn-primary modalclose">Close</button>
    </div>
</form>

<!-- Script For Tooltip -->
<script>
    $(document).ready(function () {
        $('[data-toggle="tooltip"]').tooltip();
    });
</script>
