<div class="new-design">
  <div mat-dialog-title>
    Payment Detail <label class="text-white"> Due Amount: <span
        class="badge badge-success">{{invoice.DueAmount | number:'0.0-2'}}</span></label> <button
      class="close text-white" type="button" mat-dialog-close="isChange" aria-label="Close"><span
        aria-hidden="true">×</span></button>
  </div>
  <div mat-dialog-content>
    <form *ngIf="currentUser.RoleId == 1 || currentUser.RoleId == 2" #form="ngForm">
      <div class="row" *ngIf="invoice.DueAmount>0">
        <div class="col-md-6">

          <app-date-picker [(value)]="formdata.PaymentDate" placeholder="Payment Date" name="PaymentDate"
            required="true" [maxDate]="todayDate" [form]="form">

          </app-date-picker>

        </div>
        <div class="col-md-6">
          <mat-form-field>
            <mat-label>Amount</mat-label>
            <input matInput type="number" name="PaidAmount" #PaidAmount="ngModel" [(ngModel)]="formdata.PaidAmount"
              placeholder="Amount" required [MaxValue]="invoice.DueAmount" [MinValue]="0.1" />
            <mat-error *ngIf="PaidAmount.hasError('MaxValue')">Amount is greater than Due Amount </mat-error>
            <mat-error *ngIf="PaidAmount.hasError('MinValue')">0 payment is not allowed </mat-error>
          </mat-form-field>
        </div>

        <div class="col-md-12">
          <mat-form-field>
            <mat-label>Remark</mat-label>
            <input matInput name="PaymentRemark" #PaymentRemark="ngModel" [(ngModel)]="formdata.PaymentRemark"
              placeholder="Remark" required />
          </mat-form-field>
        </div>
        <div class="col-md-12 text-right">
          <button type="submit" mat-raised-button (click)="paymentAdd(form)" class="btn btn-danger btn-sm">Add</button>
        </div>
      </div>
    </form>


    <div class="row">
      <div class="col-md-12">
        <dx-data-grid [dataSource]="dataList" [showBorders]="true" [allowColumnResizing]="true" [showColumnLines]="true"
          [showRowLines]="true" [rowAlternationEnabled]="true" [noDataText]="gridMessage" [columnAutoWidth]="true"
          (onToolbarPreparing)="onToolbarPreparing($event)" [allowColumnReordering]="true">

          <dxo-filter-panel [visible]="true"></dxo-filter-panel>

          <dxo-paging [enabled]="true" [pageSize]="10"></dxo-paging>
          <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[5, 10, 25,50,100]" [showInfo]="true">
          </dxo-pager>

          <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>

          <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>

          <dxo-export [enabled]="excel_permisson > 0" fileName="programs"></dxo-export>

          <dxo-column-chooser [enabled]="true" mode="select" [allowSearch]="true">
          </dxo-column-chooser>

          <dxi-column *ngFor="let item of columns" [dataField]="item.dataField" [minWidth]="100" [caption]="item.title | sentenceCase"
            [dataType]="item.type" [format]="item.format">
          </dxi-column>
          <ng-container *ngIf="currentUser.RoleId == 1 || currentUser.RoleId == 2">
            <dxi-column caption="Action" [allowExporting]="false" [minWidth]="50" cellTemplate="actionCellTemplate">
            </dxi-column>

            <div *dxTemplate="let d of 'actionCellTemplate'">
              <button mat-icon-button class="text-danger" (click)="$event.stopPropagation(); paymentDelete(d.data)" data-toggle="tooltip"
              title="Delete">
                <mat-icon>close</mat-icon>
              </button>
            </div>
          </ng-container>
          <div *dxTemplate="let d of 'toolbarButton'">

            <button class="text-danger" (click)="showFilterRow=!showFilterRow" mat-icon-button data-toggle="tooltip"
              title="Apply Filter">
              <mat-icon>filter_list</mat-icon>
            </button>
          </div>


        </dx-data-grid>

        </div>
    </div>
  </div>
  <div mat-dialog-actions align="center">
    <button type="button" mat-dialog-close="isChange" class="btn btn-primary btn-sm modalclose">Close</button>
  </div>
</div>

<!-- Script For Tooltip -->
<script>
  $(document).ready(function () {
    $('[data-toggle="tooltip"]').tooltip();
  });
</script>
