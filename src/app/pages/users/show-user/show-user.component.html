<div class="main-content">
    <div class="card" *ngIf="permission>0">
        <div class="card-body">

            <div class="col-12 col-sm-12 col-md-8 d-sm-flex searchdiv px-0" style="z-index: 1;">
                <div class="col-12 col-sm-6 col-md-5">
                  <mat-form-field class="selectopt" id="selectopt1">
                    <!-- <mat-label>Select an option</mat-label> -->
                    <mat-select placeholder="Type" [(ngModel)]="EventType" (selectionChange)="changeOption($event.value)">
                      <!-- <mat-option disabled> Select Type </mat-option> -->
                      <mat-option value="All" style="height: 2rem;font-size: 14px;">All</mat-option>
                      <mat-option value="Recently Modified" style="height: 2rem;font-size: 14px;">Recently modified</mat-option>
                      <mat-option value="Last Modified" style="height: 2rem;font-size: 14px;">Last 10 modified</mat-option>
                    </mat-select>
                  </mat-form-field>
                </div>
                <div class="col-12 col-sm-6 col-md-5">
                  <mat-form-field class="search-field">
                    <!-- <mat-label>Keyword</mat-label> -->
                    <input matInput name="keyword" (blur)="onBlurMethod()" (keyup.enter)="searchByEnter()" placeholder="Search Keyword" [(ngModel)]="keyword" aria-label="Keyword"/>
                    <!-- <mat-hint>search by keyword</mat-hint> -->
                    <!-- <button matSuffix type="button" class="btn btn-danger btn-sm" mat-raised-button="" (click)="searchByKeyword()">Search</button> -->
                  <a (click)="searchByKeyword()" data-toggle="tooltip" title="Search by Keyword"><span class="material-icons">
                   search </span></a>
                  </mat-form-field>
                  <span *ngIf="keyworderror" class="text-danger">Please enter keyword</span>
                </div>
            </div>

            
            <dx-data-grid [dataSource]="dataList" [showBorders]="true" [allowColumnResizing]="true"
                [showColumnLines]="true" [showRowLines]="true" [rowAlternationEnabled]="true" [noDataText]="gridMessage" [columnAutoWidth]="true"
                (onToolbarPreparing)="onToolbarPreparing($event)" [allowColumnReordering]="true"
                (onRowClick)="editUser($event.data.UserId)" (onExporting)="activitylog()">

                <dxo-filter-panel [visible]="true"></dxo-filter-panel>
                <dxo-state-storing [enabled]="columns?.length>0" type="localStorage" storageKey="user"></dxo-state-storing>
                <dxo-paging [enabled]="true" [pageSize]="10"></dxo-paging>
                <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[5, 10, 25,50,100]" [showInfo]="true">
                </dxo-pager>

                <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>

                <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>

                <dxo-export [enabled]="excel_permisson > 0" fileName="Users"></dxo-export>

                <dxo-column-chooser [enabled]="true" mode="select" [allowSearch]="true">
                </dxo-column-chooser>

                <!-- <dxo-scrolling mode="virtual"></dxo-scrolling> -->

                <dxi-column *ngFor="let item of columns" [dataField]="item.dataField" [minWidth]="100"
                    [caption]="item.title | sentenceCase" [dataType]="item.type" [format]="item.format">
                </dxi-column>

                <dxi-column caption="Status" [minWidth]="50" cellTemplate="statusCellTemplate">
                </dxi-column>

                <!-- <dxi-column caption="Primary" [minWidth]="50" cellTemplate="primaryCellTemplate">
                </dxi-column> -->


                <dxi-column caption="CC View" [minWidth]="50" cellTemplate="ccViewCellTemplate" *ngIf="currentUser.RoleId===1">
                </dxi-column>
               
               <dxi-column caption="Action" [allowExporting]="false" [minWidth]="50" cellTemplate="actionCellTemplate">
                </dxi-column>

                <div *dxTemplate="let d of 'actionCellTemplate'">

                    <!-- <button type="button" mat-raised-button class="btn btn-link btn-just-icon btn-info"
                        (click)="editUser(d.data.UserId)">
                        <mat-icon>edit</mat-icon>
                    </button> -->
                    <button type="button" mat-raised-button class="btn btn-link btn-just-icon btn-danger" 
                        (click)="$event.stopPropagation(); ghostLogin(d.data.UserId)" [matTooltip]="'Ghost login'"
                        *ngIf="(currentUser.UserId!=d.data.UserId) && (ghost_login_permission>0) && !currentUser?.GhostLogin">
                        <mat-icon>login</mat-icon>
                    </button>

                    <button type="button" mat-raised-button class="btn btn-link   btn-just-icon btn-primary"
                        (click)="$event.stopPropagation(); resetPassword(d.data.UserId)"
                        *ngIf="currentUser.RoleId===1 && currentUser.UserId!=d.data.UserId" [matTooltip]="'Reset Password'" >
                        <mat-icon>restore</mat-icon>
                    </button>

                    <button type="button" mat-raised-button class="btn btn-link btn-just-icon btn-danger" 
                        (click)="$event.stopPropagation(); deleteUser(d.data.UserId)" [matTooltip]="'Delete'"
                        *ngIf="(permission>2 && d.data.isPrimary!=1) && (currentUser.UserId!=d.data.UserId)">
                        <mat-icon>close</mat-icon>
                    </button>
                </div>

                <div *dxTemplate="let d of 'statusCellTemplate'">

                    <button (click)="$event.stopPropagation();changeStatus(d.data.UserId)" mat-raised-button="" type="button" *ngIf="currentUser.UserId!=d.data.UserId" 
                        ngClass="{{d.data.isActive=='1' ? 'btn btn-success btn-link': 'btn btn-danger btn-link' }}"
                        class="btn btn-success btn-link" [disabled]="permission<=1" [matTooltip]="'Active/InActive'">
                        <span class="mat-button-wrapper"><i class="material-icons">
                                {{ d.data.isActive=="1" ? 'done_outline': 'highlight_off'  }}
                            </i></span>
                        <div class="mat-button-ripple mat-ripple" matripple=""></div>
                        <div class="mat-button-focus-overlay"></div>
                    </button>
                </div>

                
                <!-- <div *dxTemplate="let d of 'primaryCellTemplate'">

                    <button mat-raised-button="" type="button"
                        ngClass="{{d.data.isPrimary=='1' ? 'btn btn-success btn-link': 'btn btn-danger btn-link' }}"
                        class="btn btn-success btn-link" [disabled]="permission<=1" [matTooltip]="'Primary'">
                        <span class="mat-button-wrapper"><i class="material-icons">
                                {{ d.data.isPrimary=="1" ? 'done_outline': 'highlight_off'  }}
                            </i></span>
                        <div class="mat-button-ripple mat-ripple" matripple=""></div>
                        <div class="mat-button-focus-overlay"></div>
                    </button>
                </div> -->


                <div *dxTemplate="let d of 'ccViewCellTemplate'">
                    
                    <button (click)="$event.stopPropagation();viewUpdate(d.data.UserId,d.data.view)" mat-raised-button="" type="button" *ngIf="currentUser.UserId!=d.data.UserId"
                        ngClass="{{d.data.view=='1' ? 'btn btn-success btn-link': 'btn btn-danger btn-link' }}"
                        class="btn btn-success btn-link" [disabled]="permission<=1" [matTooltip]="'View CC Info'">
                        <span class="mat-button-wrapper"><i class="material-icons">
                                {{ d.data.view=="1" ? 'done_outline': 'highlight_off'  }}
                            </i></span>
                        <div class="mat-button-ripple mat-ripple" matripple=""></div>
                        <div class="mat-button-focus-overlay"></div>
                    </button>
                </div>
                
               <div *dxTemplate="let d of 'toolbarButton'">
                    <button class="text-danger" (click)="editUser(0)" *ngIf="permission>1" mat-icon-button data-toggle="tooltip" title="New" >
                        <mat-icon>add</mat-icon>
                    </button>

                    <button class="text-danger" (click)="showFilterRow=!showFilterRow" mat-icon-button data-toggle="tooltip" title="Apply Filter">
                        <mat-icon>filter_list</mat-icon>
                    </button>
                </div>

            </dx-data-grid>
        </div>
    </div>
</div>

<!-- Script For Tooltip -->
<script>
    $(document).ready(function () {
        $('[data-toggle="tooltip"]').tooltip();
    });
</script>
