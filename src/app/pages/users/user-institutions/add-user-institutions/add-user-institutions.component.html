<div  class="new-design">
<div mat-dialog-title>
Assign
<button class="close text-white" type="button" mat-dialog-close  aria-label="Close"><span aria-hidden="true">×</span></button>
</div>
<div mat-dialog-content>
    <form #form="ngForm">
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-12">
                    <mat-form-field>
                        <mat-label>Institution</mat-label>
                        <mat-select matInput placeholder="Institution" #InstitutionId="ngModel"
                            [(ngModel)]="formdata.InstitutionId" name="InstitutionId" required
                            (selectionChange)="listRegion()"   >
                            <mat-option>
                                <ngx-mat-select-search [(ngModel)]="instFilter" [placeholderLabel]="'Search...'"
                                  [noEntriesFoundLabel]="'Not found'" name="instFilter"></ngx-mat-select-search>
                              </mat-option>
                            <mat-option [value]="0" *ngIf="roleType!=2 && institutionList?.length>0" >All</mat-option>
                            <mat-option *ngFor="let item of institutionList | stringFilterBy:instFilter:'InstName';  trackByProperty: 'InstitutionId'" [value]="item.InstitutionId">{{item.InstName}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
                <div class="col-md" *ngIf="roleType!=2 && formdata.InstitutionId>0">
                    <mat-form-field>
                        <mat-label>Region</mat-label>
                        <mat-select matInput placeholder="Region" #RegionId="ngModel" 
                        [(ngModel)]="formdata.RegionId"
                            name="RegionId" required (selectionChange)="listZone()">
                            <mat-option>
                                <ngx-mat-select-search [(ngModel)]="regionFilter" [placeholderLabel]="'Search...'"
                                [noEntriesFoundLabel]="'Not found'" name="regionFilter"></ngx-mat-select-search>
                           </mat-option>
                            <mat-option [value]="0" *ngIf="regionList?.length>0" >All</mat-option>
                            <mat-option *ngFor="let item of regionList | stringFilterBy:regionFilter:'CountryName';  trackByProperty: 'CountryId'" [value]="item.CountryId">{{item.CountryName}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
                <div class="col-md" *ngIf="roleType!=2 && formdata.RegionId>0">
                    <mat-form-field>
                        <mat-label>Zone</mat-label>
                        <mat-select matInput placeholder="Zone" #ZoneId="ngModel" [(ngModel)]="formdata.ZoneId" name="ZoneId"
                            required>
                            <mat-option>
                                    <ngx-mat-select-search [(ngModel)]="zoneFilter" [placeholderLabel]="'Search...'"
                                    [noEntriesFoundLabel]="'Not found'" name="zoneFilter"></ngx-mat-select-search>
                             </mat-option>
                            <mat-option [value]="0" *ngIf="ZoneList?.length>0">All</mat-option>
                            <mat-option *ngFor="let item of ZoneList | stringFilterBy:zoneFilter:'ZoneName';  trackByProperty: 'ZoneId'" [value]="item.ZoneId">{{item.ZoneName}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
            </div>
           
        </div>
       
    </form>
</div>
<div mat-dialog-actions align="center">
    <button mat-dialog-close type="button" class="btn btn-primary btn-sm modalclose">Cancel</button>
    <button type="submit" [disabled]="!form.valid" class="btn btn-primary btn-sm btn-cust" (click)="add()">{{btnLabel}}</button>
</div>
</div>
