<div class="main-content new-design">

<div class="card">
    <div class="card-body">


        <dx-data-grid [dataSource]="dataList" [showBorders]="true" [allowColumnResizing]="true"
      [showColumnLines]="true" [showRowLines]="true" [rowAlternationEnabled]="true" [noDataText]="gridMessage" [columnAutoWidth]="true"
      (onToolbarPreparing)="onToolbarPreparing($event)" [allowColumnReordering]="true"   (onRowClick)="(permission>1 ? edit($event.data.AssignId) :null)">
  
      <dxo-filter-panel [visible]="true"></dxo-filter-panel>

      <dxo-paging [enabled]="true" [pageSize]="10"></dxo-paging>
      <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[5, 10, 25,50,100]" [showInfo]="true">
      </dxo-pager>
  
      <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>
  
      <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>
  
      <dxo-export [enabled]="excel_permisson > 0" fileName="institutions"></dxo-export>
  
      <dxo-column-chooser [enabled]="true" mode="select" [allowSearch]="true">
      </dxo-column-chooser>
  
      <dxi-column *ngFor="let item of columns" [dataField]="item.dataField" [minWidth]="100"
          [caption]="item.title | sentenceCase" [dataType]="item.type" [format]="item.format">
      </dxi-column>
  
      <dxi-column caption="Action" [allowExporting]="false" [minWidth]="50" cellTemplate="actionCellTemplate">
  
      </dxi-column>
  
  
      <div *dxTemplate="let d of 'actionCellTemplate'">
  
          <button type="button" mat-icon-button class="text-danger"
              (click)="$event.stopPropagation(); delete(d.data.AssignId);" *ngIf="permission>2">
              <mat-icon>close</mat-icon>
          </button>
      </div>
  
      <div *dxTemplate="let d of 'toolbarButton'">
          <button class="text-danger"  (click)="edit(0)" mat-icon-button *ngIf="permission>1 && (roleType!=2 || dataList?.length<1)" data-toggle="tooltip" title="New">
              <mat-icon>add</mat-icon>
          </button>
  
          <button class="text-danger" (click)="showFilterRow=!showFilterRow" mat-icon-button data-toggle="tooltip" title="Apply Filter">
              <mat-icon>filter_list</mat-icon>
          </button>
  
      </div>
  
  </dx-data-grid>

<!-- Script For Tooltip -->
<script>
    $(document).ready(function () {
        $('[data-toggle="tooltip"]').tooltip();
    });
</script>
