<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-12">
        <ngx-extended-pdf-viewer
        [base64Src]="data"
        [height]="'75vh'"
        [useBrowserLocale]="true"
        [mobileFriendlyZoom]="mobileFriendlyZoomSetting"
        [showZoomButtons]="true"
        showSidebarOnLoad="false"
      >
      </ngx-extended-pdf-viewer>
      </div>
    </div>
  </div>
</div>
