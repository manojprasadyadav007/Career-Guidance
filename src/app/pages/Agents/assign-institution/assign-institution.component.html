                    <dx-data-grid [dataSource]="dataList" [showBorders]="true" [allowColumnResizing]="true"
                    [showColumnLines]="true" [showRowLines]="true" [rowAlternationEnabled]="true" [noDataText]="gridMessage" [columnAutoWidth]="true"
                    (onToolbarPreparing)="onToolbarPreparing($event)" [allowColumnReordering]="true" (onExporting)="activitylog()">
                    <dxo-filter-panel [visible]="true" ></dxo-filter-panel>
                    <dxo-paging [enabled]="true" [pageSize]="10"></dxo-paging>
                    <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[5, 10, 25,50,100]" [showInfo]="true">
                    </dxo-pager>
                
                    <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>
                
                    <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>
                
                    <dxo-export [enabled]="excel_permisson > 0" fileName="{{this.parentName}} Institution"></dxo-export>
                
                    <dxo-column-chooser [enabled]="true" mode="select" [allowSearch]="true">
                    </dxo-column-chooser>
                
                    <dxi-column *ngFor="let item of columns" [dataField]="item.dataField" 
                        [caption]="item.title | sentenceCase" [dataType]="item.type" [format]="item.format"  >
              
                    </dxi-column>
            
                
                    <dxi-column caption="Action" [allowExporting]="false"  [fixed]="true" fixedPosition="right" [minWidth]="75" [width]="75" cellTemplate="actionCellTemplate">
                
                    </dxi-column>
                    <div *dxTemplate="let d of 'actionCellTemplate'">
                        <mat-menu #instMenu="matMenu">
                            <span class="menuempty">
                                <span class="ref"></span>
                            </span>
                        <button (click)=" $event.stopPropagation();  addBlackList(d.data,0)" id="product1" mat-menu-item  type="button"
                        class=""
                        *ngIf="d.data.Status.toLowerCase() ==='working' && can_delete"> <span class="material-icons icon-position">
                            indeterminate_check_box
                            </span>
                        Blacklist
                    </button>
                  

                    <button (click)=" $event.stopPropagation();  addBlackList(d.data,1)" mat-menu-item 
                        *ngIf="d.data.Status.toLowerCase() ==='working' && can_delete"><span class="material-icons icon-position">
                            cancel
                            </span>
                        Block
                    </button>
                
                        <button type="button" mat-menu-item  
                            (click)="$event.stopPropagation(); delete(d.data);" *ngIf="can_delete">
                            <span class="material-icons icon-position">
                                close
                                </span>Delete
                        </button>
                    </mat-menu>
                    <button mat-icon-button  [matMenuTriggerFor]="instMenu"
                    (click)="$event.stopPropagation()">
                        <mat-icon class="more_dropdown">keyboard_arrow_down</mat-icon>
                    </button>
                    </div>
                
                    <div *dxTemplate="let d of 'toolbarButton'">
                        <button class="text-danger" (click)="add()" mat-icon-button  *ngIf="can_add" data-toggle="tooltip" title="New">
                            <mat-icon>add</mat-icon>
                        </button>
                
                        <button class="text-danger" (click)="showFilterRow=!showFilterRow" mat-icon-button data-toggle="tooltip" title="Apply Filter">
                            <mat-icon>filter_list</mat-icon>
                        </button>
                
                    </div>
                
                </dx-data-grid>
