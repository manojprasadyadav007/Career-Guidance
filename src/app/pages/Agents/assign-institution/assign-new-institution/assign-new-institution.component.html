<form #form="ngForm" form (ngSubmit)="onSubmit(form)" class="new-design">
  <div mat-dialog-title>
    Assign Institute
    <button class="close text-white" type="button" mat-dialog-close aria-label="Close"><span
        aria-hidden="true">×</span></button>
  </div>
  <div mat-dialog-content>
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-12">
          <mat-form-field>
            <mat-label>Institution</mat-label>
            <mat-select matInput placeholder="Institution" #InstitutionId="ngModel" [(ngModel)]="formdata.InstitutionId"
              name="InstitutionId" required pattern="^[1-9]\d*$" (selectionChange)="listRegion()">
              <mat-option>
                <ngx-mat-select-search [(ngModel)]="instFilter" [placeholderLabel]="'Search...'"
                  [noEntriesFoundLabel]="'Not found'" name="instFilter"></ngx-mat-select-search>
              </mat-option>
              <mat-option [disabled]="true">Select Institution</mat-option>
              <mat-option
                *ngFor="let institute of institutionList | stringFilterBy:instFilter:'InstName';  trackByProperty: 'InstitutionId'"
                [value]="institute.InstitutionId">
                {{institute.InstName}}</mat-option>
            </mat-select>
            <mat-error *ngIf="InstitutionId.hasError('pattern') || InstitutionId.hasError('required')">Institution is
              required</mat-error>
          </mat-form-field>
        </div>
        <div class="col-md">
          <mat-form-field>
            <mat-label>Region</mat-label>
            <mat-select matInput placeholder="Region" #RegionId="ngModel" [(ngModel)]="formdata.RegionId"
              name="RegionId" required (selectionChange)="listZone()">
              <mat-option>
                <ngx-mat-select-search [(ngModel)]="regionFilter" [placeholderLabel]="'Search...'"
                  [noEntriesFoundLabel]="'Not found'" name="regionFilter"></ngx-mat-select-search>
              </mat-option>
              <mat-option [value]="0" *ngIf="regionList?.length>0">All</mat-option>
              <mat-option
                *ngFor="let item of regionList | stringFilterBy:regionFilter:'CountryName';  trackByProperty: 'CountryId'"
                [value]="item.CountryId">{{item.CountryName}}</mat-option>
            </mat-select>
            <mat-error *ngIf="RegionId.hasError('required')">Region is required </mat-error>
          </mat-form-field>
        </div>
        <div class="col-md" *ngIf="formdata.RegionId>0">
          <mat-form-field>
            <mat-label>Zone</mat-label>
            <mat-select matInput placeholder="Zone" #ZoneId="ngModel" [(ngModel)]="formdata.ZoneId" name="ZoneId"
              required>
              <mat-option>
              <ngx-mat-select-search [(ngModel)]="zoneFilter" [placeholderLabel]="'Search...'"
                [noEntriesFoundLabel]="'Not found'" name="zoneFilter"></ngx-mat-select-search>
              </mat-option>
              <mat-option [value]="0" *ngIf="ZoneList?.length>0">All</mat-option>
              <mat-option
                *ngFor="let item of ZoneList | stringFilterBy:zoneFilter:'ZoneName';  trackByProperty: 'ZoneId'"
                [value]="item.ZoneId">{{item.ZoneName}}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
      </div>
      <div class="row">
        <div class="col-md-6">
          <mat-form-field>
            <mat-label>Agent Code</mat-label>
            <input matInput #agentCode="ngModel" [pattern]="agentCodePattern" [(ngModel)]="formdata.AgentCode"
              name="agentCode">
            <mat-error *ngIf="agentCode.errors?.pattern">
              Please enter only letters and numbers
            </mat-error>
          </mat-form-field>
        </div>
      </div>
    </div>

  </div>
  <div mat-dialog-actions align="center">
    <button type="button" mat-dialog-close class="btn btn-sm btn-primary modalclose">Close</button>
    <button type="submit" class="btn btn-sm btn-primary btn-cust" [disabled]="flagdisabled">Assign</button>
  </div>
</form>
