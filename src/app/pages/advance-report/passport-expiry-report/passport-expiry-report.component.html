<div class="main-content new-design">
    <div class="card">
        <div class="card-body">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-md-12">
                        <form #form="ngForm">
                            <div class="row">
                                <div class="col-md-3">

                                    <app-date-picker [(value)]="filterData.fromdate" placeholder="From" name="fromdate"
                                        required="true" [maxDate]="filterData.todate" [form]="form">

                                    </app-date-picker>
                                </div>
                                <div class="col-md-3">
                                    <app-date-picker [(value)]="filterData.todate" placeholder="To" name="todate"
                                        required="true" [minDate]="filterData.fromdate" [form]="form">

                                    </app-date-picker>
                                </div>
                                <div class="col-md-4">
                                    <mat-form-field>
                                        <mat-label>Agent</mat-label>
                                        <mat-select matInput placeholder="Agent" #Agent="ngModel"
                                            [(ngModel)]="filterData.Agent" name="Agent" required>
                                            <mat-option>
                                                <ngx-mat-select-search [(ngModel)]="agentFilter" [placeholderLabel]="'Search...'"
                                                  [noEntriesFoundLabel]="'Not found'" name="agentFilter"></ngx-mat-select-search>
                                              </mat-option>
                                            <mat-option [value]="0" *ngIf="agentList?.length>0">All</mat-option>
                                            <mat-option [value]="item.AgentId" *ngFor="let item of agentList | stringFilterBy:agentFilter:'CompanyName';  trackByProperty: 'AgentId'">
                                                {{item.CompanyName}}</mat-option>
                                        </mat-select>
                                    </mat-form-field>
                                </div>
                                <div class="col-md mt-2 text-center">
                                    <button type="button" (click)="showReport()" mat-raised-button
                                        class="btn btn-sm btn-danger" [disabled]="!form.valid">Get</button>
                                </div>
                            </div>

                        </form>
                    </div>

                </div>
                <div class="row">
                    <div class="col-md-12 text-right">
                        <button type="button" (click)="showAdvance=false;" [hidden]="!showAdvance"
                            class="btn btn-sm btn-danger" mat-raised-button>Basic</button>
                    </div>
                </div>
                <div class="row">
                   
                    <div class="col-md-12" [hidden]="showAdvance">
                        <dx-data-grid [dataSource]="reportData?.data" [showBorders]="true" [allowColumnResizing]="true"

                            [showColumnLines]="true"  [showRowLines]="true" [rowAlternationEnabled]="true"
                            [columnAutoWidth]="true" style="height: 100%;" (onToolbarPreparing)="onToolbarPreparing($event)" (onExporting)="activitylog()">
   
                            <!-- <dxo-filter-panel [visible]="true" ></dxo-filter-panel> -->



                            <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>
                            
                            <dxo-paging [enabled]="true" [pageSize]="10"></dxo-paging>

                           <dxo-pager   [showPageSizeSelector]="true"   [allowedPageSizes]="[5, 10, 25, 50, 100]"  [showInfo]="true" ></dxo-pager>

                            <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>

                            <dxo-export [enabled]="excel_permisson > 0" fileName="Passport expiry"></dxo-export> 

                            <dxo-column-chooser [enabled]="true" mode="select"></dxo-column-chooser>

                            <!-- <dxo-scrolling mode="virtual"></dxo-scrolling> -->

                            
                            <dxi-column [minWidth]="100" *ngFor="let item of reportData?.columns"
                                [dataField]="item.columnDef" [caption]="item.header" [dataType]="item.type"
                                [format]="item.format">

                            </dxi-column>
                           
                            <div *dxTemplate="let d of 'toolbarButton'">
                                <button type="button" (click)="showAdvance=true;" [hidden]="showAdvance"
                                class="btn btn-sm btn-danger">Advance</button>

                                    <button class="text-danger" (click)="showFilterRow=!showFilterRow" mat-icon-button
                                        data-toggle="tooltip" title="Apply Filter">
                                        <mat-icon>filter_list</mat-icon>
                                    </button>
                            </div>

                        </dx-data-grid>
                    </div>
                        <div class="row" [hidden]="!showAdvance">

                            <div class="col-md-12">
                                <dx-chart id="sales-chart">
                                    <dxo-common-series-settings type="bar"></dxo-common-series-settings>
                                    <dxo-size [height]="320"></dxo-size>
                                    <dxo-adaptive-layout [width]="450"></dxo-adaptive-layout>
                                    <dxo-tooltip [enabled]="true" [customizeTooltip]="customizeTooltip"></dxo-tooltip>
                                </dx-chart>
                            </div>
        
                            <div class="col-md-12">
                                <dx-pivot-grid id="sales" [allowSortingBySummary]="true" [allowSorting]="true"
                                    [allowFiltering]="true" [showBorders]="true" [height]="490" [dataSource]="reportData?.data">
        
                                    <dxi-column *ngFor="let item of reportData?.columns" [dataField]="item.columnDef"
                                        [width]="140" [caption]="item.header">
        
                                    </dxi-column>
        
                                    <dxo-export [enabled]="excel_permisson > 0" fileName="Passport expiry"></dxo-export>
        
                                    <dxo-field-chooser [height]="500"></dxo-field-chooser>
        
                                    <dxo-field-panel [showDataFields]="true" [showRowFields]="true" [showColumnFields]="true"
                                        [showFilterFields]="true" [allowFieldDragging]="true" [visible]="true">
                                    </dxo-field-panel>
                                </dx-pivot-grid>
                            </div>
                        </div>
                   
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Script For Tooltip -->
<script>
    $(document).ready(function () {
        $('[data-toggle="tooltip"]').tooltip();
    });
</script>
