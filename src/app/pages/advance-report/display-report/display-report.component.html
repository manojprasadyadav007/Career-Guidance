<div class="main-content new-design">
    <div class="card">
        <div class="card-body">
            <div class="container-fluid">
                <form #form="ngForm" (ngSubmit)="onSubmit(form)">

                    <div class="row">
                        <ng-container *ngIf="fromToStatusflag">
                            <div class="col-md-3">
                                <app-date-picker [(value)]="formdata.fromdate" placeholder="From" name="fromdate"
                                    required="true" [maxDate]="formdata.todate" [form]="form">
                                </app-date-picker>
                            </div>
                            <div class="col-md-3">
                                <app-date-picker [(value)]="formdata.todate" placeholder="To" name="todate"
                                    required="true" [minDate]="formdata.fromdate" [form]="form">
                                </app-date-picker>
                            </div>
                        </ng-container>
                        <div class="col-md-4" *ngIf="institutionflag && currentUser.RoleType !=2">
                            <mat-form-field>
                                <mat-label>Institutions</mat-label>
                                <mat-select matInput placeholder="Institution" #InstitutionId="ngModel"
                                    [(ngModel)]="formdata.InstitutionId" name="institution"
                                    (selectionChange)="onInstitutionChange(true)" >

                                    <mat-option>
                                        <ngx-mat-select-search [(ngModel)]="instituteFilter"
                                            [placeholderLabel]="'Search...'" [noEntriesFoundLabel]="'Not found'"
                                            name="instituteFilter"></ngx-mat-select-search>
                                    </mat-option>
                                    <mat-option [value]='0'>All</mat-option>
                                    <mat-option
                                        *ngFor="let item of instList |  stringFilterBy:instituteFilter:'InstName';  trackByProperty: 'InstitutionId' "
                                        [value]="item.InstitutionId">
                                        {{item.InstName}}</mat-option>
                                </mat-select>
                            </mat-form-field>
                        </div>
                        <div class="col-md-4" *ngIf="agentflag && this.currentUser.RoleId != 2">
                            <mat-form-field>
                                <mat-label>Agent</mat-label>
                                <mat-select matInput placeholder="Agent" #AgentId="ngModel"
                                    [(ngModel)]="formdata.AgentId" name="agent" (selectionChange)="showReport()">

                                    <mat-option>
                                        <ngx-mat-select-search [(ngModel)]="agentFilter"
                                            [placeholderLabel]="'Search...'" [noEntriesFoundLabel]="'Not found'"
                                            name="agentFilter"></ngx-mat-select-search>
                                    </mat-option>
                                    <mat-option [value]='0'>All</mat-option>
                                    <mat-option
                                        *ngFor="let agentitem of agentList |  stringFilterBy:agentFilter:'CompanyName';  trackByProperty: 'AgentId' "
                                        [value]="agentitem.AgentId">
                                        {{agentitem.CompanyName}}</mat-option>
                                </mat-select>
                            </mat-form-field>
                        </div>
                        <div class="col-md-2" *ngIf="DurationStatus">
                            <mat-form-field>
                                <!-- <mat-label>Duration</mat-label> -->
                                <mat-select matInput placeholder="Duration" #Duration="ngModel"
                                    [(ngModel)]="formdata.Duration" name="filter" (selectionChange)="showReport()">

                                    <mat-option>
                                        <ngx-mat-select-search [(ngModel)]="durationFilter"
                                            [placeholderLabel]="'Search...'" [noEntriesFoundLabel]="'Not found'"
                                            name="durationFilter">
                                        </ngx-mat-select-search>
                                    </mat-option>
                                    <mat-option
                                        *ngFor="let item of DurationList |  stringFilterBy:durationFilter:'name'"
                                        [value]="item.id">
                                        {{item.name}}</mat-option>
                                </mat-select>
                            </mat-form-field>
                        </div>


                        <ng-container *ngIf="!formdata.InstitutionId>0">
                        <div class="col-md-4"
                            *ngIf="countryflag && this.currentUser.RoleType != 2">
                            <mat-form-field>
                                <mat-label>Report Format</mat-label>
                                <mat-select matInput placeholder="Country" #CountryId="ngModel"
                                    [(ngModel)]="formdata.CountryId" name="CountryId" required
                                   [pattern]="appPattern.dropDownNumericValue"
                                    (selectionChange)="showReport()" >

                                    <mat-option>
                                        <ngx-mat-select-search [(ngModel)]="countryFilter"
                                            [placeholderLabel]="'Search...'" [noEntriesFoundLabel]="'Not found'"
                                            name="countryFilter">
                                        </ngx-mat-select-search>
                                    </mat-option>
              
                                    <mat-option
                                        *ngFor="let countryitem of countryList |  stringFilterBy:countryFilter:'CountryName';  trackByProperty: 'CountryId' "
                                        [value]="countryitem.CountryId">
                                        {{countryitem.CountryName}}</mat-option>
                                </mat-select>
                            </mat-form-field>
                        </div>
                    </ng-container>


                        <div class="col-md-4" *ngIf="regionflag">
                            <mat-form-field>
                                <mat-label>Region</mat-label>
                                <mat-select matInput placeholder="Region" #RegionId="ngModel"
                                    [(ngModel)]="formdata.RegionId" name="RegionId"
                                    (selectionChange)="fillCountry(true)">
                                    <mat-option>
                                        <ngx-mat-select-search [(ngModel)]="regionFilter"
                                            [placeholderLabel]="'Search...'" [noEntriesFoundLabel]="'Not found'"
                                            name="regionFilter"></ngx-mat-select-search>
                                    </mat-option>
                                    <mat-option [value]="0">All</mat-option>
                                    <mat-option
                                        *ngFor="let regionitem of regionList |  stringFilterBy:regionFilter:'CountryName';  trackByProperty: 'CountryId' "
                                        [value]="regionitem.CountryId">
                                        {{regionitem.CountryName}}</mat-option>
                                </mat-select>
                            </mat-form-field>
                            
                        </div>

                        <div class="col-md-4" *ngIf="countryIdFilterflag">
                            <mat-form-field>
                                <mat-label>Country</mat-label>
                                <mat-select matInput placeholder="Country" #CountryIdFilter="ngModel"
                                    [(ngModel)]="formdata.CountryIdFilter" name="CountryIdFilter"
                                    (selectionChange)="fillProvince(true)">

                                    <mat-option>
                                        <ngx-mat-select-search [(ngModel)]="countryIdFilter"
                                            [placeholderLabel]="'Search...'" [noEntriesFoundLabel]="'Not found'"
                                            name="countryIdFilter"></ngx-mat-select-search>
                                    </mat-option>
                                    <mat-option [value]="0">All</mat-option>
                                    <mat-option
                                        *ngFor="let countryitem of countryIdList |  stringFilterBy:countryIdFilter:'CountryName';  trackByProperty: 'CountryId' "
                                        [value]="countryitem.CountryId">
                                        {{countryitem.CountryName}}</mat-option>
                                </mat-select>
                            </mat-form-field>
                        </div>

                        <div class="col-md-4" *ngIf="stateflag">
                            <mat-form-field>
                                <mat-label>Province</mat-label>
                                <mat-select matInput placeholder="State" #StateId="ngModel"
                                    [(ngModel)]="formdata.StateId" name="StateId">

                                    <mat-option>
                                        <ngx-mat-select-search [(ngModel)]="stateFilter"
                                            [placeholderLabel]="'Search...'" [noEntriesFoundLabel]="'Not found'"
                                            name="stateFilter"></ngx-mat-select-search>
                                    </mat-option>
                                    <mat-option [value]="0">All</mat-option>
                                    <mat-option
                                        *ngFor="let stateitem of stateList |  stringFilterBy:stateFilter:'ProvinceName';  trackByProperty: 'ProvinceId' "
                                        [value]="stateitem.ProvinceId">
                                        {{stateitem.ProvinceName}}</mat-option>
                                </mat-select>
                            </mat-form-field>
                        </div>

                        <div class="col-md-4" *ngIf="intakeflag && formdata.InstitutionId>0">
                            <mat-form-field>
                                <mat-label>Intake</mat-label>
                                <mat-select matInput placeholder="State" #IntakeId="ngModel"
                                    [(ngModel)]="formdata.IntakeId" name="IntakeId" (selectionChange)="showReport()">

                                    <mat-option>
                                        <ngx-mat-select-search [(ngModel)]="intakeFilter"
                                            [placeholderLabel]="'Search...'" [noEntriesFoundLabel]="'Not found'"
                                            name="intakeFilter"></ngx-mat-select-search>
                                    </mat-option>
                                    <mat-option [value]="0">All</mat-option>
                                    <mat-option
                                        *ngFor="let intakeitem of intakeList |  stringFilterBy:intakeFilter:'IntakeName';  trackByProperty: 'IntakeGroupId' "
                                        [value]="intakeitem.IntakeGroupId">
                                        {{intakeitem.IntakeName}}</mat-option>
                                </mat-select>
                            </mat-form-field>
                        </div>
                        <div class="col-md mt-2" *ngIf="showFlagCount>1">
                            <button type="submit" mat-raised-button class="btn btn-sm btn-danger"
                                [disabled]="!form.valid">Get</button>
                        </div>
                    </div>
                </form>
                <div class="row">
                    <div class="col-md-12 text-right">
                        <button type="button" (click)="showAdvance=false;" [hidden]="!showAdvance"
                            class="btn btn-sm btn-danger" mat-raised-button>Basic</button>
                    </div>
                </div>
               

                <div class="row" [hidden]="showAdvance">
                    <div class="col-md-12">
                        <dx-data-grid #datagrid [dataSource]="reportData?.data" [showBorders]="true"
                            [allowColumnResizing]="true" [noDataText]="gridMessage" [showColumnLines]="true" [showRowLines]="true"
                            (onRowClick)="onrowClick($event.data)" [rowAlternationEnabled]="true"
                            [columnAutoWidth]="true"
                            [showColumnHeaders]="this.subReport ==='weekly-dashboard'?false : true"
                            (onToolbarPreparing)="onToolbarPreparing($event)" (onExporting)="activitylog()">
                            <dxo-filter-panel [visible]="this.subReport ==='weekly-dashboard'?false : true">
                            </dxo-filter-panel>

                            <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>

                            <dxo-paging [enabled]="this.subReport ==='weekly-dashboard'?false : true" [pageSize]="10">
                            </dxo-paging>
                            <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[5, 10, 25,50,100]"
                                [showInfo]="true">
                            </dxo-pager>





                            <dxo-header-filter [visible]="this.subReport ==='weekly-dashboard'?false : true" [allowSearch]="true">
                            </dxo-header-filter>

                            <dxo-export [enabled]="excel_permisson > 0" fileName="{{this.title}}"></dxo-export>

                            <dxo-column-chooser
                                [enabled]="(this.subReport !=='weekly-dashboard' && excel_permisson)? true : false"
                                mode="select"></dxo-column-chooser>

                            <dxi-column *ngFor="let item of reportData?.columns" [dataField]="item.columnDef"
                                [minWidth]="100" [caption]="item.header" [dataType]="item.type" [format]="item.format">

                            </dxi-column>
                            
                                <dxo-summary *ngIf="resLength>0">
                                    <ng-container *ngFor=" let item of reportData?.columns">
                                        <dxi-total-item *ngIf="item?.isTotal" [column]="item.columnDef"
                                        summaryType="sum"  displayFormat="Sum: {0}"> </dxi-total-item>
                                   </ng-container>
                                </dxo-summary>
                            <div *dxTemplate="let d of 'toolbarButton'">
                                <ng-container *ngIf="this.subReport ==='weekly-dashboard'?false : true">
                                    <button type="button" (click)="showAdvance=true;" [hidden]="showAdvance"
                                        class="btn btn-sm btn-danger">Advance</button>

                                    <button class="text-danger" (click)="showFilterRow=!showFilterRow" mat-icon-button
                                        data-toggle="tooltip" title="Apply Filter">
                                        <mat-icon>filter_list</mat-icon>
                                    </button>
                                </ng-container>
                            </div>


                        </dx-data-grid>
                    </div>

                </div>
                <div class="row" [hidden]="!showAdvance">

                    <div class="col-md-12">
                        <dx-chart id="sales-chart">
                            <dxo-common-series-settings type="bar"></dxo-common-series-settings>
                            <dxo-size [height]="320"></dxo-size>
                            <dxo-adaptive-layout [width]="450"></dxo-adaptive-layout>
                            <dxo-tooltip [enabled]="true" [customizeTooltip]="customizeTooltip"></dxo-tooltip>
                        </dx-chart>
                    </div>

                    <div class="col-md-12">
                        <dx-pivot-grid id="sales" [allowSortingBySummary]="true" [allowSorting]="true"
                            [allowFiltering]="true" [showBorders]="true" [height]="490" [dataSource]="reportData?.data">

                            <dxi-column *ngFor="let item of reportData?.columns" [dataField]="item.columnDef"
                                [width]="140" [caption]="item.header">

                            </dxi-column>

                            <dxo-export [enabled]="excel_permisson > 0" fileName="{{this.title}}"></dxo-export>

                            <dxo-field-chooser [height]="500"></dxo-field-chooser>

                            <dxo-field-panel [showDataFields]="true" [showRowFields]="true" [showColumnFields]="true"
                                [showFilterFields]="true" [allowFieldDragging]="true" [visible]="true">
                            </dxo-field-panel>
                        </dx-pivot-grid>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Script For Tooltip -->
<script>
    $(document).ready(function () {
        $('[data-toggle="tooltip"]').tooltip();
    });
</script>
