<div class="main-content new-design">
    <div class="card">
        <div class="card-body">
            <dx-data-grid id="feedback_table"[dataSource]="dataList"  [showBorders]="true" [allowColumnResizing]="true" [showColumnLines]="true" (onCellClick)="oncellClick($event)"  [showRowLines]="true" [rowAlternationEnabled]="true" [noDataText]="gridMessage" [columnAutoWidth]="true" [cellHintEnabled]="false" [allowColumnReordering]="true" (onToolbarPreparing)="onToolbarPreparing($event)" (onExporting)="activitylog()">
                <dxo-filter-panel [visible]="true"></dxo-filter-panel>

                <dxo-paging [enabled]="true" [pageSize]="10"></dxo-paging>
                <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[5, 10, 25,50,100]" [showInfo]="true">
                </dxo-pager>

                <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>

                <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>

                <dxo-export [enabled]="excel_permisson > 0" fileName="Feedbacks"></dxo-export>

                <dxo-column-chooser [enabled]="true" mode="select" [allowSearch]="true">
                </dxo-column-chooser>

                <!-- <dxo-scrolling mode="virtual"></dxo-scrolling> -->
                
                <dxi-column *ngFor="let item of columns" [dataField]="item.dataField" 
                    [caption]="item.title | sentenceCase" [dataType]="item.type" [format]="item.format"  [minWidth]="200">
                </dxi-column>
                

                <dxi-column caption="Attachment" [fixed]="true" fixedPosition="right" [minWidth]="50"  cellTemplate="actionCellTemplate" *ngIf="permission>2">
                </dxi-column>

                <div *dxTemplate="let d of 'actionCellTemplate'">
                    <a target="_blank" href="{{filepath+d.data.AttachmentPath}}" mat-icon-button class="text-info"
                    data-toggle="tooltip" title="View" (click)="$event.stopPropagation();" *ngIf="d.data.AttachmentPath">
                        <mat-icon>visibility</mat-icon>
                    </a>
                    
                </div>
                <div *dxTemplate="let d of 'toolbarButton'">
                    <button class="text-danger" (click)="showFilterRow=!showFilterRow" mat-icon-button data-toggle="tooltip" title="Apply Filter">
                        <mat-icon>filter_list</mat-icon>
                    </button>
                </div>

            </dx-data-grid>
        </div>
    </div>
</div>

<!-- Script For Tooltip -->
<script>
    $(document).ready(function () {
        $('[data-toggle="tooltip"]').tooltip();
    });
</script>
