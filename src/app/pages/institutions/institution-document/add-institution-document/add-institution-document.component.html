<form #form="ngForm"  class="new-design">
    <div mat-dialog-title>
     Document
     <button class="close text-white" type="button" mat-dialog-close  aria-label="Close"><span aria-hidden="true">×</span></button>
    </div>
    <div mat-dialog-content>
      
        <div class="row">
          <div class="col-md-12">
            <mat-form-field >
              <mat-label>Region</mat-label>
                <mat-select matInput  placeholder="Region" #RegionId="ngModel"
                [(ngModel)]="formdata.RegionId" name="RegionId" 
                [pattern]="modelPattern.dropDownNumericValueWithMinusAnd0" required >
                <mat-option>
                  <ngx-mat-select-search [(ngModel)]="regionFilter" [placeholderLabel]="'Search...'"
                    [noEntriesFoundLabel]="'Not found'" name="regionFilter"></ngx-mat-select-search>
                </mat-option>
                <mat-option>Select Region</mat-option>
                <mat-option [value]="0" *ngIf="regionList?.length>0">All</mat-option>
                <mat-option *ngFor="let req of regionList | stringFilterBy:regionFilter:'CountryName';  trackByProperty: 'CountryId' " [value]="req.CountryId">{{req.CountryName}}</mat-option>
              </mat-select>
            </mat-form-field>
          </div>
          <div class="col-md-12">
            <mat-form-field >
              <mat-label>Document</mat-label>
                <mat-select matInput  placeholder="Document" 
                #DocumentId="ngModel" [(ngModel)]="formdata.DocumentId" name="DocumentId" required
                 >
                <mat-option>
                <ngx-mat-select-search [(ngModel)]="docFilter" [placeholderLabel]="'Search...'"
                [noEntriesFoundLabel]="'Not found'" name="docFilter"></ngx-mat-select-search>
              </mat-option>
                <mat-option *ngFor="let document of documentList | stringFilterBy:docFilter:'DocumentName';  trackByProperty: 'DocumentTypeId'  " [value]="document.DocumentTypeId">
                  {{document.DocumentName}}</mat-option>
              </mat-select>
              <mat-error *ngIf="DocumentId.hasError( 'required') || DocumentId.hasError( 'pattern')">Select document type</mat-error>
            </mat-form-field>
          </div>
        </div>
       
    </div>
    
    <div mat-dialog-actions align="center">
      
      <button type="button" mat-dialog-close class="btn btn-primary btn-sm modalclose">Close</button>
    
      <button type="submit" (click)="onSubmit(form)" class="btn btn-primary btn-sm btn-cust" [disabled]= "flagdisabled"  >{{btnLable}}</button>
    </div>
    </form>
