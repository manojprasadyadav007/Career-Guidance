<div [ngClass]="{'main-content' : currentUser.RoleType === 2}">
<div class="card">
  <div class="card-body">
    <!-- <div class="table-responsive "> -->
       <dx-data-grid [dataSource]="dataList" [showBorders]="true" [allowColumnResizing]="true"
                [showColumnLines]="true" [showRowLines]="true" [rowAlternationEnabled]="true" [noDataText]="gridMessage" [columnAutoWidth]="true"
                (onToolbarPreparing)="onToolbarPreparing($event)" [allowColumnReordering]="true"
                (onRowClick)="( permission>1 ? add($event.data.InstCampusId,$event.data.CampusName) : null);" (onExporting)="activitylog()">

                <dxo-filter-panel [visible]="true"></dxo-filter-panel>

                <dxo-paging [enabled]="true" [pageSize]="10"></dxo-paging>
                <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[5, 10, 25,50,100]" [showInfo]="true">
                </dxo-pager>

                <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>

                <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>

                <dxo-export [enabled]="excel_permisson > 0" fileName="{{this.parentName}} Campus"></dxo-export>

                <dxo-column-chooser [enabled]="true" mode="select" [allowSearch]="true">
                </dxo-column-chooser>

                <!-- <dxo-scrolling mode="virtual"></dxo-scrolling> -->
               

                <dxi-column *ngFor="let item of columns" [dataField]="item.dataField" 
                    [caption]="item.title | sentenceCase" [dataType]="item.type" [format]="item.format">
                </dxi-column>
                <dxi-column caption="Action" [allowExporting]="false" [fixed]="true" fixedPosition="right" [width]="70" cellTemplate="actionCellTemplate" >

                </dxi-column>
   

                <div *dxTemplate="let d of 'actionCellTemplate'">
                  <mat-menu #instMenu="matMenu">
                    <span class="menuempty">
                        <span class="ref"></span>
                    </span>
                  <a *ngIf="d.data.GoogleMapLink != null" mat-menu-item  class="backgroundColor" href="{{d.data.GoogleMapLink}}" target="_blank" rel="noopener noreferrer" data-toggle="tooltip" title="Location">
                    <span class="material-icons">
                      location_on
                      </span> Location</a>

                    <button type="button" mat-menu-item 
                        (click)="$event.stopPropagation(); delete(d.data.InstCampusId)" *ngIf="permission>2" data-toggle="tooltip" title="Delete">
                        <span class="material-icons icon-position">
                          close
                          </span> Delete
                    </button>
                  </mat-menu>
                  <button mat-icon-button  [matMenuTriggerFor]="instMenu"
                  (click)="$event.stopPropagation()">
                      <mat-icon class="more_dropdown">keyboard_arrow_down</mat-icon>
                  </button>
                </div>

                <div *dxTemplate="let d of 'toolbarButton'">
                    <button class="text-danger"  (click)="add(0,'')" mat-icon-button
                    *ngIf="permission>1" data-toggle="tooltip" title="New">
                        <mat-icon>add</mat-icon>
                    </button>

                    <button class="text-danger" (click)="showFilterRow=!showFilterRow" mat-icon-button data-toggle="tooltip" title="Apply Filter">
                        <mat-icon>filter_list</mat-icon>
                    </button>

                </div>

            </dx-data-grid>

  </div>
</div>
</div>

<!-- Script For Tooltip -->
<script>
  $(document).ready(function () {
    $('[data-toggle="tooltip"]').tooltip();
  });
</script>
