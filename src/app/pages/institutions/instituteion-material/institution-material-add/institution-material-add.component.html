<form #form="ngForm" class="new-design">
  <div mat-dialog-title>
    Marketing-Collateral
    <button
      class="close text-white"
      type="button"
      mat-dialog-close
      aria-label="Close"
    >
      <span aria-hidden="true">×</span>
    </button>
  </div>
  <div mat-dialog-content>
    <div class="row">
      <div class="col-md-12">
        <mat-form-field>
          <mat-label>Region</mat-label>
          <mat-select
            placeholder="Region"
            name="RegionId"
            [(ngModel)]="formdata.RegionId"
            #RegionId="ngModel"
            required
            [pattern]="modelPattern.dropDownNumericValueWithMinusAnd0"
          >
            <mat-option>
              <ngx-mat-select-search
                [(ngModel)]="regionFilter"
                [placeholderLabel]="'Search...'"
                [noEntriesFoundLabel]="'Not found'"
                name="regionFilter"
              ></ngx-mat-select-search>
            </mat-option>
            <mat-option> Select Region </mat-option>
            <mat-option [value]="0" *ngIf="regionList?.length > 0">
              All
            </mat-option>
            <mat-option
              *ngFor="
                let item of regionList
                  | stringFilterBy: regionFilter:'CountryName';
                trackByProperty: 'CountryId'
              "
              [value]="item.CountryId"
            >
              {{ item.CountryName }}
            </mat-option>
          </mat-select>
          <mat-error
            *ngIf="
              RegionId.hasError('pattern') || RegionId.hasError('required')
            "
            >Region is required</mat-error
          >
        </mat-form-field>
      </div>
      <div class="col-md-12">
        <app-file-uploader
        [(file)]="docFile"
          (fileChange)="uploadMaterialFile($event)"
          label="Attachment"
          controlName="materialfile"
          fileType=".jpg,.png,.pdf,.doc,.docx,.xlsx,.xls,.csv,.txt"
          [uploadIndepended]="true"
          [initialFilePath]="formdata.MaterialPath"
          dir="institution"
        ></app-file-uploader>
        <input
          type="hidden"
          #MaterialPath="ngModel"
          [(ngModel)]="formdata.MaterialPath"
          name="MaterialPath"
        />
        <mat-error
          *ngIf="
            !materialFile &&
            form.submitted &&
            !(formdata.MaterialPath?.length > 0)
          "
          >Attachment is required</mat-error
        >
      </div>
      <div class="col-md-12">
        <mat-form-field>
          <mat-label>Group</mat-label>
          <input
            matInput
            placeholder="Group"
            type="text"
            #MaterialTitle="ngModel"
            [(ngModel)]="formdata.MaterialTitle"
            name="MaterialTitle"
            required
          />
          <mat-error
            *ngIf="
              MaterialTitle.hasError('pattern') ||
              MaterialTitle.hasError('required')
            "
            >Enter valid group</mat-error
          >
        </mat-form-field>
      </div>
      <div class="col-md-12">
        <mat-form-field>
          <mat-label>File name</mat-label>
          <input
            matInput
            placeholder="File name"
            type="text"
            #MaterialDescription="ngModel"
            [(ngModel)]="formdata.MaterialDescription"
            name="MaterialDescription"
           
            required

          />
          <mat-error
            *ngIf="
              MaterialDescription.hasError('pattern') ||
              MaterialDescription.hasError('required')
            "
            >Enter valid file name</mat-error
          >
        </mat-form-field>
      </div>
    </div>
  </div>
  <div class="col-md-12">
    <input type="checkbox" [(ngModel)]="checkTersm" name="checkTersm" />&nbsp;
    &nbsp; I consent to the MSM Unify
    <a href=" https://msmunify.com/terms-and-conditions/" target="_blank"
      ><u>Terms of Service</u></a
    >
  </div>
  <div class="col-md-6">
    <mat-error class="fieldcont" *ngIf="form.submitted && !checkTersm"
      >Please check the terms & services .</mat-error
    >
  </div>
  <div mat-dialog-actions align="center">
    <button
      type="button"
      mat-dialog-close
      class="btn btn-primary btn-sm modalclose"
    >
      Close
    </button>

    <button
      type="submit"
      class="btn btn-primary btn-sm btn-cust"
      (click)="save(form)"
      [disabled]="flagdisabled"
    >
      {{ btnLabel }}
    </button>
  </div>
</form>
