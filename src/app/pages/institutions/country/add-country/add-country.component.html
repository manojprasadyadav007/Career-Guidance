<form #form="ngForm" (submit)="onSubmit(form)"  class="new-design">
  <div mat-dialog-title>
    Region Of Marketing
    <button class="close text-white" type="button" mat-dialog-close  aria-label="Close"><span aria-hidden="true">×</span></button>
  </div>
  <div mat-dialog-content>

    <div class="row">

      <div class="col-md-12">
        <mat-form-field>
          <mat-label>Region</mat-label>
          <mat-select matInput placeholder="Region" #CountryId="ngModel" [(ngModel)]="formdata.CountryId"
            name="CountryId" required pattern="^[1-9,\-]\d*$">
  
            <mat-option>
              <ngx-mat-select-search [(ngModel)]="regionFilter" [placeholderLabel]="'Search...'"
                [noEntriesFoundLabel]="'Not found'" name="regionFilter"></ngx-mat-select-search>
            </mat-option>
            <mat-optgroup  *ngFor="let list of countrylistData  | stringFilterforMultiBy:regionFilter:'CountryName': 'data'" [label]="list.group"  >
              <mat-option *ngFor="let item of  list.data" [value]="item.CountryId">
                {{item.CountryName}}
              </mat-option>
            </mat-optgroup>

          </mat-select>
          <mat-error *ngIf="CountryId.hasError('required')">Region is required</mat-error>
        </mat-form-field>

      </div>
    </div>


  </div>
  <div mat-dialog-actions align="center">
    
    <button  type="button" mat-dialog-close class="btn btn-primary modalclose btn-sm">Close</button>

    <button  type="submit" [disabled]="!form.valid || flagdisabled"
      class="btn btn-primary btn-sm btn-cust">Add</button>
  </div>
</form>
