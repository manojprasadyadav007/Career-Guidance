<form #form="ngForm" (submit)="submitform(form)" class="new-design">
    <div mat-dialog-title>
        Status
        <button class="close text-white" type="button" [mat-dialog-close]="isChange"  aria-label="Close"><span aria-hidden="true">×</span></button>
    </div>
    <div mat-dialog-content>
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-6 col-sm-12" [ngClass]="{'col-md-6 col-sm-12':showForm,'col-md-12':!showForm}">

                    <dx-data-grid [dataSource]="dataList" [showBorders]="true" [allowColumnResizing]="true"
                        [showColumnLines]="true" [showRowLines]="true" [rowAlternationEnabled]="true"
                        [noDataText]="gridMessage" [columnAutoWidth]="true" (onToolbarPreparing)="onToolbarPreparing($event)"
                        [allowColumnReordering]="true"
                        (onRowClick)="( currentUser.RoleId===1  ? edit($event.data.StatusId) : null);">

                        <dxo-filter-panel [visible]="true"></dxo-filter-panel>

                        <dxo-paging [enabled]="true" [pageSize]="10"></dxo-paging>
                        <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[5, 10, 25,50,100]"
                            [showInfo]="true">
                        </dxo-pager>

                        <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>

                        <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>

                        <dxo-export [enabled]="excel_permisson > 0" fileName="institutions"></dxo-export>

                        <dxo-column-chooser [enabled]="true" mode="select" [allowSearch]="true">
                        </dxo-column-chooser>

                        <!-- <dxo-scrolling mode="virtual"></dxo-scrolling> -->

                        <dxi-column *ngFor="let item of columns" [dataField]="item.dataField" [minWidth]="100"
                            [caption]="item.title | sentenceCase" [dataType]="item.type" [format]="item.format">
                        </dxi-column>

                        <dxi-column caption="Action" [allowExporting]="false" [minWidth]="50" cellTemplate="actionCellTemplate" *ngIf="currentUser.RoleId===1">

                        </dxi-column>

                        <div *dxTemplate="let d of 'actionCellTemplate'">

                            <button type="button" mat-icon-button class="text-danger"
                                (click)="$event.stopPropagation(); delete(d.data.StatusId)" data-toggle="tooltip" title="Delete" >
                                <mat-icon>close</mat-icon>
                            </button>
                        </div>

                        <div *dxTemplate="let d of 'toolbarButton'">
                            <button type="button" class="text-danger" (click)="add(form)" mat-icon-button *ngIf="currentUser.RoleId===1" data-toggle="tooltip" title="New">
                                <mat-icon>add</mat-icon>
                            </button>

                            <button class="text-danger" (click)="showFilterRow=!showFilterRow" mat-icon-button data-toggle="tooltip" title="Apply Filter">
                                <mat-icon>filter_list</mat-icon>
                            </button>

                        </div>

                    </dx-data-grid>
                </div>
                <div class="col-md-6 col-sm-12" *ngIf="currentUser.RoleId===1" [hidden]="!showForm">
                    <div class="row">
                        <div class="col-md-12">
                            <mat-form-field>
                                <mat-label>Status</mat-label>
                                <input matInput placeholder="Status" type="text" #StatusName="ngModel"
                                    [(ngModel)]="formdata.StatusName" name="StatusName" required>
                            </mat-form-field>
                        </div>
                        <div class="col-md-12">
                            <mat-form-field>
                                <mat-label>Outcome</mat-label>
                                <mat-select matInput placeholder="Outcome" #OutCome="ngModel"
                                    [(ngModel)]="formdata.OutCome" name="OutCome" required>
                                    <mat-option value="InProcess">
                                        In Process
                                    </mat-option>
                                    <mat-option value="Approved">
                                        Approved
                                    </mat-option>
                                    <mat-option value="Rejected">
                                        Rejected
                                    </mat-option>
                                    <!-- <mat-option value="Deferred">
                                        Deferred
                                    </mat-option> -->
                                    <mat-option value="Refund">
                                        Refund
                                    </mat-option>
                                    <mat-option value="Dropout">
                                        Dropout
                                    </mat-option>
                                    <mat-option value="Study Permit Approved">Study Permit Approved</mat-option>
                                    <mat-option value="Study Permit Refused">Study Permit Refused</mat-option>
                                </mat-select>
                            </mat-form-field>
                        </div>
                        <div class="col-md-12">
                            <mat-form-field>
                                <mat-label>Visible To</mat-label>
                                <mat-select matInput placeholder="Visible To" #VisiblityStatus="ngModel"
                                    [(ngModel)]="formdata.VisiblityStatus" name="VisiblityStatus" required>
                                    <mat-option [value]="0">
                                        All
                                    </mat-option>
                                    <mat-option [value]="1">
                                        MSM Team
                                    </mat-option>
                                    <mat-option [value]="2">
                                        Agent
                                    </mat-option>
                                    <mat-option [value]="3">
                                        Institution
                                    </mat-option>
                                </mat-select>
                            </mat-form-field>

                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <div mat-dialog-footer align="center">
        <button type="button" [mat-dialog-close]="isChange" class="btn btn-sm  btn-primary modalclose">Close</button>
        <button type="submit" class="btn btn-sm btn-primary btn-cust" *ngIf="currentUser.RoleId===1" [disabled]="flagdisabled" [hidden]="!showForm">
            {{ formdata.StatusId ? 'Update' : 'Add' }}
        </button>
    </div>
</form>

<!-- Script For Tooltip -->
<script>
    $(document).ready(function () {
        $('[data-toggle="tooltip"]').tooltip();
    });
</script>
