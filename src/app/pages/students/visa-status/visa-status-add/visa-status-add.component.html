<form #form="ngForm" class="new-design">
  <div mat-dialog-title>
    Visa
    <button class="close text-white" type="button" mat-dialog-close  aria-label="Close"><span aria-hidden="true">×</span></button>
  </div>
  <div mat-dialog-content>
    <div class="row">
      <div class="col-md-12">
        <mat-form-field >
          <mat-label>Country</mat-label>
          <mat-select placeholder="Country" name="CountryId" [(ngModel)]="formdata.CountryId" #CountryId="ngModel" required
            [pattern]="modelPattern.dropDownNumericValue"
            (selectionChange)="formdata.VisaTypeId=0; fillVisaType();"  >
            <mat-option>
              <ngx-mat-select-search [(ngModel)]="countryFilter" [placeholderLabel]="'Search...'"
                [noEntriesFoundLabel]="'Not found'" name="countryFilter"></ngx-mat-select-search>
            </mat-option>
            <mat-option *ngFor="let item of countryList | stringFilterBy:countryFilter:'CountryName';  trackByProperty: 'CountryId'" [value]="item.CountryId"> {{item.CountryName}} </mat-option>
          </mat-select>
          <mat-error>Country is required</mat-error>
        </mat-form-field>
      </div>


      <div class="col-md-12">
        <mat-form-field >
          <mat-label>Type</mat-label>
          <mat-select placeholder="Type" name="VisaTypeId" [(ngModel)]="formdata.VisaTypeId" #VisaTypeId="ngModel" required
            [pattern]="modelPattern.dropDownNumericValue">
            <mat-option>
              <ngx-mat-select-search [(ngModel)]="typeFilter" [placeholderLabel]="'Search...'"
                [noEntriesFoundLabel]="'Not found'" name="typeFilter"></ngx-mat-select-search>
            </mat-option>
            <mat-option *ngFor="let item of visaTypeList | stringFilterBy:typeFilter:'VisaTypeName';  trackByProperty: 'VisaTypeId'" [value]="item.VisaTypeId"> {{item.VisaTypeName}} </mat-option>
          </mat-select>
          <mat-error>Type is required</mat-error>
        </mat-form-field>
      </div>

      <div class="col-md-12">
        <mat-form-field >
          <mat-label>Status</mat-label>
          <mat-select placeholder="Status" name="VisaStatus" [(ngModel)]="formdata.VisaStatus" #VisaStatus="ngModel" required
            [pattern]="modelPattern.dropDownNumericValueWith0">
            <mat-option>
            <ngx-mat-select-search [(ngModel)]="statusFilter" [placeholderLabel]="'Search...'"
            [noEntriesFoundLabel]="'Not found'" name="statusFilter"></ngx-mat-select-search>
          </mat-option>
            <mat-option [value]="-1"> Select Status </mat-option>
            <mat-option *ngFor="let item of visaStatusList | stringFilterBy:statusFilter:'StatusName';  trackByProperty: 'StatusId'" [value]="item.StatusId"> {{item.StatusName}} </mat-option>
          </mat-select>
          <mat-error>Status is required</mat-error>
        </mat-form-field>
      </div>

      <div class="col-md-6" *ngIf="formdata.VisaStatus==2">
        <app-date-picker placeholder="Issue Date" name="issueDate" [(value)]="formdata.IssueDate" [required]="formdata.VisaStatus==2"
        [form]="form"  [maxDate]="maxDate"  >
        </app-date-picker>
      </div>

      <div class="col-md-6" *ngIf="formdata.VisaStatus==2">
        <app-date-picker placeholder="Valid Upto"  name="validaUpto" [(value)]="formdata.ValidUpto" [required]="formdata.VisaStatus==2"
        [form]="form" [minDate]="formdata.IssueDate" >
        </app-date-picker>
      </div>
    
      
      <div class="col-md-12">
        <mat-form-field>
          <mat-label>Comment</mat-label>
            <textarea matInput placeholder="Comment" rows="3" #Comment="ngModel" [(ngModel)]="formdata.Comment" name="Comment"></textarea>
          </mat-form-field>
     </div>
      
    </div>
  </div>
  <div mat-dialog-actions align="center">
    <button type="button" mat-dialog-close class="btn btn-primary btn-sm modalclose">Close</button>
    
    <button type="submit" class="btn btn-primary btn-sm btn-cust" (click)="save(form)" *ngIf="permission>1" >{{btnLabel}}</button>
    
  </div>
</form>
