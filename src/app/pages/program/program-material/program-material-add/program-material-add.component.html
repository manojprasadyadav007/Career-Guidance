<form #form="ngForm" class="new-design">
  <div mat-dialog-title>
    Marketing-Collateral
    <button class="close text-white" type="button" mat-dialog-close aria-label="Close"><span
        aria-hidden="true">×</span></button>
  </div>
  <div mat-dialog-content>
    <div class="row">
      <div class="col-md-12">
        <mat-form-field>
          <mat-label>Region</mat-label>
          <mat-select placeholder="Region" name="RegionId" [(ngModel)]="formdata.RegionId" #RegionId="ngModel" required
            [pattern]="modelPattern.dropDownNumericValueWithMinusAnd0">
            <mat-option>
              <ngx-mat-select-search [(ngModel)]="regionFilter" [placeholderLabel]="'Search...'"
                [noEntriesFoundLabel]="'Not found'" name="regionFilter"></ngx-mat-select-search>
            </mat-option>
            <mat-option [value]="0" *ngIf="regionList?.length>0"> All </mat-option>
            <mat-option
              *ngFor="let item of regionList | stringFilterBy:regionFilter:'CountryName';  trackByProperty: 'CountryId'"
              [value]="item.CountryId"> {{item.CountryName}} </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <div class="col-md-12">
        <app-file-upload (fileChange)="materialFile=$event" label="Attachment" controlName="materialfile"
          [initialFilePath]="formdata.MaterialPath" dir="program"></app-file-upload>
        <input type="hidden" #MaterialPath="ngModel" [(ngModel)]="formdata.MaterialPath" name="MaterialPath">
        <mat-error *ngIf="(!materialFile && formdata.MaterialId===0 && !(formdata.MaterialPath?.length > 0))">Attachment is
          required</mat-error>
      </div>
      <div class="col-md-12">
        <mat-form-field>
          <mat-label>Title</mat-label>
          <input matInput placeholder="Title" type="text" #MaterialTitle="ngModel" [(ngModel)]="formdata.MaterialTitle"
            name="MaterialTitle" required [pattern]="modelPattern.alphaNumericWithSpace">
          <mat-error *ngIf="MaterialTitle.hasError('pattern') || MaterialTitle.hasError('required')">Enter valid title</mat-error>
        </mat-form-field>
      </div>
      <div class="col-md-12">
        <mat-form-field>
          <mat-label>Description</mat-label>
          <input matInput placeholder="Description" type="text" #MaterialDescription="ngModel"
            [(ngModel)]="formdata.MaterialDescription" name="MaterialDescription">
        </mat-form-field>
      </div>
    </div>
  </div>
  <div class="col-md-12">
    <input type="checkbox" [(ngModel)]="checkTersm" name="checkTersm">&nbsp; &nbsp; I consent to the MSM Unify <a
      href=" https://msmunify.com/terms-and-conditions/" target="_blank"><u>Terms of
        Service</u></a>
  </div>
  <div class="col-md-6">
    <mat-error class="fieldcont" *ngIf="form.touched && !checkTersm">Please check the
      terms & services .</mat-error>
  </div>
  <div mat-dialog-actions align="center">

    <button type="button" mat-dialog-close class="btn btn-primary btn-sm modalclose">Close</button>

    <button type="submit" class="btn btn-primary btn-sm btn-cust" (click)="save(form)" [disabled]="flagdisabled">{{btnLabel}}</button>
  </div>
</form>
