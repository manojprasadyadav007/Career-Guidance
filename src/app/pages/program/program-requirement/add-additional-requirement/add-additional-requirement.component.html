<form  #form="ngForm" (submit)="onSubmit(form)"  class="new-design">
    <div mat-dialog-title>
      Additional Requirement
      <button class="close text-white" type="button" (click)="close()"  aria-label="Close"><span aria-hidden="true">×</span></button>
    </div>
    <div mat-dialog-content>
        <div class="row">
          <div class="col-md-12">
            <mat-form-field >
              <mat-label>Region</mat-label>
                <mat-select matInput  placeholder="Region" #RegionId="ngModel"
                [(ngModel)]="formdata.RegionId" name="RegionId" 
                [pattern]="modelPattern.dropDownNumericValueWithMinusAnd0" required >
                <mat-option>
                  <ngx-mat-select-search [(ngModel)]="regionFilter" [placeholderLabel]="'Search...'"
                    [noEntriesFoundLabel]="'Not found'" name="regionFilter"></ngx-mat-select-search>
                </mat-option>
                <mat-option [value]="0" *ngIf="regionList?.length>0" >All</mat-option>
                <mat-option *ngFor="let req of regionList | stringFilterBy:regionFilter:'CountryName';  trackByProperty: 'CountryId' " [value]="req.CountryId">{{req.CountryName}}</mat-option>
              </mat-select>
              <mat-error *ngIf="RegionId.hasError('required')">Region is required</mat-error>
            </mat-form-field>
          </div>
          <div class="col-md-12">
            <div class="form-group">
                <label>Detail</label><span style="color: red;"> *</span>
                <!-- <ckeditor [editor]="Editor" tagName="textarea" placeholder="Reuirement Detail" rows="5"
                  #AdditionalReq="ngModel" [(ngModel)]="formdata.AdditionalReq" name="AdditionalReq"
                  required  
                  ></ckeditor> -->
                  <dx-html-editor tagName="textarea" placeholder="Requirement Detail" rows="5"
                  #AdditionalReq="ngModel" [(ngModel)]="formdata.AdditionalReq" name="AdditionalReq"
                  required id="AdditionalReq">
              <dxo-toolbar [items]="items"> </dxo-toolbar>
              <dx-validator >  
                <dxi-validation-rule type='required' message='Detail is required'></dxi-validation-rule>  
              </dx-validator>
          </dx-html-editor>
            </div>
          </div>
        </div>
        <dx-popup [showTitle]="true" title="Markup" [(visible)]="popupVisible" [showCloseButton]="true">
          <textarea   [(ngModel)]="formdata.AdditionalReq" name="AdditionalReq" style="height:100% !important; width: 100%; display: block; border:0px;"  ></textarea>
      </dx-popup>
    </div>
    <div mat-dialog-actions align="center">
      <button type="button" (click)="close()" class="btn btn-sm btn-primary modalclose">Close</button>


      <button type="submit" class="btn btn-sm btn-primary btn-cust" [disabled]="!form.valid || flagdisabled" >Add</button>

  </div>
</form>
