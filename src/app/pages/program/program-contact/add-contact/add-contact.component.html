<form #form="ngForm" (submit)="onSubmit(form)" class="new-design">

  <div mat-dialog-title>
    Program Contact
    <button class="close text-white" type="button" (click)="close()" aria-label="Close"><span
        aria-hidden="true">×</span></button>
  </div>
  <div mat-dialog-content>
    <div class="row">
      <div class="col-md-12">
        <mat-form-field>
          <mat-label>Select User</mat-label>
          <mat-select matInput placeholder="Select User" #ContactUserId="ngModel" [(ngModel)]="formdata.ContactUserId"
            name="ContactUserId"  required>
            <mat-option>
              <ngx-mat-select-search [(ngModel)]="ContactFilter" [placeholderLabel]="'Search...'"
                [noEntriesFoundLabel]="'Not found'" name="ContactFilter"></ngx-mat-select-search>
            </mat-option>
            <!-- <mat-option [value]='0'>All</mat-option> -->
            <mat-option
              *ngFor="let user of userList |  stringFilterBy:ContactFilter:'DisplayName';  trackByProperty: 'UserId' "
              [value]="user.UserId">
              {{user.DisplayName}}</mat-option>
          </mat-select>

          <mat-error *ngIf="ContactUserId.hasError('required')">User is required</mat-error>

        </mat-form-field>
      </div>
    </div>
  </div>
  <div mat-dialog-actions align="center">
    <button type="button" (click)="close()" class="btn btn-sm btn-primary modalclose">Close</button>
    <button type="submit" class="btn btn-sm btn-primary btn-cust" [disabled]="flagdisabled">Add</button>
  </div>


</form>
