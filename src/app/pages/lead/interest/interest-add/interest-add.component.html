    <form #form="ngForm" class="new-design">
<div mat-dialog-title >
     Interest
     <button class="close text-white" type="button" mat-dialog-close  aria-label="Close"><span aria-hidden="true">×</span></button>
  </div>
  <div mat-dialog-content>
  
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-12">
                    <mat-form-field>
                        <mat-label>Institution</mat-label>
                        <mat-select matInput placeholder="Institution" #InstitutionId="ngModel"
                            [(ngModel)]="formdata.InstitutionId" name="InstitutionId"
                            (selectionChange)="fillRegion()" required >
                            <mat-option>
                                <ngx-mat-select-search [(ngModel)]="instFilter" [placeholderLabel]="'Search...'"
                                  [noEntriesFoundLabel]="'Not found'" name="instFilter"></ngx-mat-select-search>
                              </mat-option>
                            <mat-option [value]="0" *ngIf="institutionList?.length>0">All</mat-option>
                            <mat-option *ngFor="let item of institutionList | stringFilterBy:instFilter:'InstName';  trackByProperty: 'InstitutionId'" [value]="item.InstitutionId">
                                {{item.InstName}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
                <!-- <div class="col-md-6">
                    <mat-form-field>
                        <mat-label>Region</mat-label>
                        <mat-select matInput placeholder="Region" #RegionId="ngModel"
                            [(ngModel)]="formdata.RegionId" name="RegionId">
                            <mat-option [value]="0" *ngIf="regionList?.length>0">All</mat-option>
                            <mat-option *ngFor="let item of regionList" [value]="item.CountryId">
                                {{item.CountryName}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div> -->
                <div class="col-md-12" *ngIf="formdata.InstitutionId>0">
                    <mat-form-field>
                        <mat-label>Program</mat-label>
                        <mat-select matInput placeholder="Program" #ProgramId="ngModel"
                            [(ngModel)]="formdata.ProgramId" name="ProgramId" required>
                            <mat-option>
                                <ngx-mat-select-search [(ngModel)]="prgFilter" [placeholderLabel]="'Search...'"
                                  [noEntriesFoundLabel]="'Not found'" name="prgFilter"></ngx-mat-select-search>
                              </mat-option>
                            <mat-option [value]="0" *ngIf="programList?.length>0" >All</mat-option>
                            <mat-option *ngFor="let item of programList | stringFilterBy:prgFilter:'ProgramName';  trackByProperty: 'ProgramId'" [value]="item.ProgramId">
                                {{item.ProgramName}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
            </div>
        </div>
       
 
  </div>
  <div mat-diaglog-action align="center">

    <button type="button" mat-dialog-close class="btn btn-sm btn-primary modalclose">Close</button>

    <button type="button" class="btn btn-primary btn-sm btn-cust" [disabled]="!form.valid" (click)="add()">Add</button>
    
  </div> 
  </form>
