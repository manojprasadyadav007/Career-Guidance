<section  mat-dialog-title>
    <span>Login</span> 
   <span class="pull-right">
    <button type="button" mat-mini-fab  aria-label="close" mat-dialog-close color="primary">
      <mat-icon>close</mat-icon>
    </button>
   </span>
  
</section>
<div mat-dialog-container>
  
      <form #form="ngForm" form>
        <div class="row">
          <div class="col-md-12">
              <mat-form-field>
                <mat-label>User Name</mat-label>
                  <span matPrefix>
                    <mat-icon>face</mat-icon>
                  </span>
                  <input matInput type="text" placeholder="User Name"
                  #UserName="ngModel" [(ngModel)]="formdata.UserName" name="UserName"
                  required email
                  >
                </mat-form-field>
          </div>
          <div class="col-md-12">
              <mat-form-field>
                <mat-label>Password</mat-label>
                  <span matPrefix>
                    <mat-icon>lock_outline</mat-icon>
                  </span>
                  <input matInput type="password" placeholder="Password"
                  #Password="ngModel" [(ngModel)]="formdata.Password" name="Password"
                  required minlength="3" maxlength="50"
                  >
                </mat-form-field>
          </div>
          <div class="col-md-12 text-center text-danger" *ngIf="loginerror">
              <p >{{loginerror}}</p>
          </div>
        </div>
      
      
      </form>
</div>
<div mat-dialog-actions align="end">
  
  <button mat-raised-button color="primary" type="button" mat-dialog-close="0"  class="btn btn-danger">Signup</button>

  <button mat-raised-button type="button" [disabled]="!form.valid" (click)="login()" class="btn btn-danger">Login</button>
</div>
