<div [ngClass]="{'card':showCard}">
  <div [ngClass]="{'card-body':showCard}">
    <dx-data-grid [dataSource]="dataList" [showBorders]="true" [allowColumnResizing]="true" [showColumnLines]="true"
      [showRowLines]="true" [rowAlternationEnabled]="true" [columnAutoWidth]="true"
      (onToolbarPreparing)="onToolbarPreparing($event)" [allowColumnReordering]="true"
      (onRowClick)="($event.data.InvoiceId===0 ? add($event.data) : null)" (onExporting)="activitylog()">

      <dxo-filter-panel [visible]="true"></dxo-filter-panel>

      <dxo-paging [enabled]="true" [pageSize]="10"></dxo-paging>
      <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[5, 10, 25,50,100]" [showInfo]="true">
      </dxo-pager>

      <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>

      <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>

      <dxo-export [enabled]="excel_permisson > 0" fileName="{{this.parentName}} Fee"></dxo-export>

      <dxo-column-chooser [enabled]="true" mode="select" [allowSearch]="true">
      </dxo-column-chooser>

      <dxi-column *ngFor="let item of columns" [dataField]="item.dataField"  [caption]="item.title | sentenceCase"
        [dataType]="item.type" [format]="item.format">
      </dxi-column>

      <dxi-column caption="Action" [allowExporting]="false" [fixed]="true" fixedPosition="right" [minWidth]="100" cellTemplate="actionCellTemplate">

      </dxi-column>

      <div *dxTemplate="let d of 'actionCellTemplate'">

        <a target="_blank" href="{{filePath+'student/'+ d.data.ReceiptPath}}" *ngIf="d.data.ReceiptPath" data-toggle="tooltip" title="View">
          <mat-icon>visibility</mat-icon>
        </a>
        <!-- <button type="button" (click)="edit(d.data.AgreementId)" mat-raised-button
        class="btn btn-primary btn-link" *ngIf="permission>1">
        <i class="material-icons">edit</i>
      </button> -->
        <ng-container *ngIf="d.data.InvoiceId <= 0">
          <button type="button" mat-icon-button class="text-danger" data-toggle="tooltip" title="Delete"
            (click)="$event.stopPropagation(); delete(d.data.DepositId)" *ngIf="permisssion>2">
            <mat-icon>close</mat-icon>
          </button>
        </ng-container>
        </div>

      <div *dxTemplate="let d of 'toolbarButton'">
        <button class="text-danger" (click)="add()" mat-icon-button *ngIf="permisssion>1" data-toggle="tooltip"
          title="New">
          <mat-icon>add</mat-icon>
        </button>

        <button class="text-danger" (click)="showFilterRow=!showFilterRow" mat-icon-button data-toggle="tooltip"
          title="Apply Filter">
          <mat-icon>filter_list</mat-icon>
        </button>

      </div>

    </dx-data-grid>
  
  </div>
</div>


<!-- Script For Tooltip -->
<script>
  $(document).ready(function () {
    $('[data-toggle="tooltip"]').tooltip();
  });
</script>
