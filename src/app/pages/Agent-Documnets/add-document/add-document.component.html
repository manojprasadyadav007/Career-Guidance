<form #form="ngForm"  class="new-design">
    <div mat-dialog-title>
     Document
     <button class="close text-white" type="button" mat-dialog-close  aria-label="Close"><span aria-hidden="true">×</span></button>
    </div>
    <div mat-dialog-content>
      
        <div class="row">
          <div class="col-md-12">
            <mat-form-field >
              <mat-label>Country</mat-label>
                <mat-select matInput  placeholder="Region" #CountryId="ngModel"
                [(ngModel)]="formdata.CountryId" name="CountryId" (selectionChange)="fillProvince(formdata.CountryId,true)"
                [pattern]="modelPattern.dropDownNumericValueWithMinusAnd0" required >
                <mat-option>
                  <ngx-mat-select-search [(ngModel)]="regionFilter" [placeholderLabel]="'Search...'"
                    [noEntriesFoundLabel]="'Not found'" name="regionFilter"></ngx-mat-select-search>
                </mat-option>
                <mat-option>Select Country</mat-option>
                <mat-option [value]="0" *ngIf="regionList?.length>0">All</mat-option>
                <mat-option *ngFor="let req of regionList | stringFilterBy:regionFilter:'CountryName';  trackByProperty: 'CountryId' " [value]="req.CountryId">{{req.CountryName}}</mat-option>
              </mat-select>
              <mat-error *ngIf="CountryId.hasError( 'required') || CountryId.hasError( 'pattern')">Select country</mat-error>
            </mat-form-field>
          </div>
          <div class="col-md-12" *ngIf = "formdata.CountryId > 0">
            <mat-form-field>
                <mat-label>Province</mat-label>
                <mat-select placeholder="Province" #ProvinceId="ngModel" [(ngModel)]="formdata.ProvinceId"
                    name="ProvinceId" required>
                    <mat-option>
                        <ngx-mat-select-search [(ngModel)]="primContProvinceFilter"
                            [placeholderLabel]="'Search...'" [noEntriesFoundLabel]="'Not found'"
                            name="provinceFilterForPrimCont">
                        </ngx-mat-select-search>
                    </mat-option>
                    <mat-option>None</mat-option>
                    <mat-option [value]="0" *ngIf="provinceList?.length>0">All</mat-option>
                    <mat-option
                        *ngFor="let province of provinceList | stringFilterBy:primContProvinceFilter:'ProvinceName';  trackByProperty: 'ProvinceId' "
                        [value]="province.ProvinceId">
                        {{province.ProvinceName}}</mat-option>
                </mat-select>
                <mat-error *ngIf="form.submitted && ProvinceId.hasError('required')">Province is required
                </mat-error>
            </mat-form-field>
        </div>
          <div class="col-md-12">
            <mat-form-field >
              <mat-label>Document</mat-label>
                <mat-select matInput  placeholder="Document" 
                #DocumentTypeId="ngModel" [(ngModel)]="formdata.DocumentTypeId" name="DocumentTypeId" required
                 >
                <mat-option>
                <ngx-mat-select-search [(ngModel)]="docFilter" [placeholderLabel]="'Search...'"
                [noEntriesFoundLabel]="'Not found'" name="docFilter"></ngx-mat-select-search>
              </mat-option>
                <mat-option *ngFor="let document of documentList | stringFilterBy:docFilter:'DocumentName';  trackByProperty: 'DocumentTypeId'  " [value]="document.DocumentTypeId">
                  {{document.DocumentName}}</mat-option>
              </mat-select>
              <mat-error *ngIf="DocumentTypeId.hasError( 'required') || DocumentTypeId.hasError( 'pattern')">Select document</mat-error>
            </mat-form-field>
          </div>
        </div>
       
    </div>
    
    <div mat-dialog-actions align="center">
      
      <button type="button" mat-dialog-close class="btn btn-primary btn-sm modalclose">Close</button>
    
      <button type="submit" (click)="onSubmit(form)" class="btn btn-primary btn-sm btn-cust" [disabled]= "flagdisabled">{{btnLable}}</button>
    </div>
    </form>
