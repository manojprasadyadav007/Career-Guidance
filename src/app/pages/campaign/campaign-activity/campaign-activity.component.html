<div [ngClass]="{ 'main-content new-design': +parentType === 9}">
<div   [ngClass]="{'card':showCard}">
        
  <div  [ngClass]="{'card-body':showCard}">

      <dx-data-grid id="campaigndesc" [dataSource]="dataList" [showBorders]="true" [allowColumnResizing]="true"
      [showColumnLines]="true" [showRowLines]="true" [rowAlternationEnabled]="true" [noDataText]="gridMessage" [columnAutoWidth]="true"
      (onToolbarPreparing)="onToolbarPreparing($event)" [allowColumnReordering]="true"  (onRowClick)="edit($event.data.ActivityId)" (onExporting)="activitylog()">
  
      <dxo-filter-panel [visible]="true"></dxo-filter-panel>

      <dxo-paging [enabled]="true" [pageSize]="10"></dxo-paging>
      <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[5, 10, 25,50,100]" [showInfo]="true">
      </dxo-pager>
  
      <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>
  
      <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>
  
      <dxo-export [enabled]="excel_permisson > 0" fileName="{{this.parentName}} {{this.title}}"></dxo-export>
  
      <dxo-column-chooser [enabled]="true" mode="select" [allowSearch]="true">
      </dxo-column-chooser>
  
      <dxi-column *ngFor="let item of columns" [dataField]="item.dataField" [minWidth]="100"
          [caption]="item.title | sentenceCase" [dataType]="item.type" [format]="item.format">
      </dxi-column>
      <dxi-column caption="Description" [minWidth]="100" cellTemplate="desCellTemplate">
  
      </dxi-column>
  
      <dxi-column caption="Action" [allowExporting]="false" [minWidth]="50" cellTemplate="actionCellTemplate" *ngIf="permission>2">
  
      </dxi-column>
      <div *dxTemplate="let d of 'desCellTemplate'">
        
        <span  class="text text-wrap" [innerHTML]="d.data.ActivityDescription "></span>
      
    </div>
  
  
      <div *dxTemplate="let d of 'actionCellTemplate'">
  
          <button type="button" mat-icon-button class="text-danger"  data-toggle="tooltip" title="Delete"
              (click)="$event.stopPropagation(); delete(d.data.ActivityId)" *ngIf="permission>2">
              <mat-icon>close</mat-icon>
          </button>
      </div>
  
      <div *dxTemplate="let d of 'toolbarButton'">
          <button class="text-danger"  (click)="add()" mat-icon-button 
          *ngIf="permission>1" data-toggle="tooltip" title="New">
              <mat-icon>add</mat-icon>
          </button>
  
          <button class="text-danger" (click)="showFilterRow=!showFilterRow" mat-icon-button data-toggle="tooltip" title="Apply Filter">
              <mat-icon>filter_list</mat-icon>
          </button>
  
      </div>
  
  </dx-data-grid>

    </div>
  </div>
</div>
  <!-- Script For Tooltip -->
  <script>
    $(document).ready(function () {
      $('[data-toggle="tooltip"]').tooltip();
    });
  </script>
