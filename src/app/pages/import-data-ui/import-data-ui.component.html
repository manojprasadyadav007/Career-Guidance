<div class="main-content new-design">
   <div class="container-fluid">
      <div class="row" *ngIf="!excelColumnList">
         <div class="col-12">
            <div class="card">
               <div class="card-body">
                  <app-file-upload [(file)]="docFile"></app-file-upload>
                  <button (click)="doUpload()" *ngIf="docFile" class="btn btn-danger">Upload</button>
                  <p><progress [value]="progress" *ngIf="progress>0">{{progress}}%</progress></p>
               </div>
            </div>
         </div>
      </div>
      <div class="row" *ngIf="excelColumnList || 0===0">
         <div class="col-12">
            <form #form="ngForm" form>
               <div class="card">
                  <div class="card-header">
                     <h3 class="card-title">
                        Map Your Column
                     </h3>
                  </div>
                  <div class="card-body">
                     <!-- <div class="row">
                        <div class="col-4" *ngFor="let item of columnList; let i = index">
                           <mat-form-field>
                              <mat-select [placeholder]="item.title" name="comment{{i}}" [(ngModel)]="item.columnName"
                                 required pattern="^.{1,}$">
                                 <mat-option *ngFor="let excelColumn of excelColumnList"
                                    [value]="excelColumn.columnName">
                                    {{excelColumn.columnName}}
                                 </mat-option>
                              </mat-select>
                           </mat-form-field>
                        </div>
                     </div> -->
                     <div class="row" *ngFor="let item of columnList; let i = index">
                        <div class="col-md-4 col-sm-12" style="vertical-align: middle;">
                           <h5>{{item.title}}</h5>  
                        </div>
                        <div class="col-md-4 col-sm-12">
                           <mat-form-field>
                              <mat-label>{{item.title}}</mat-label>
                              <mat-select [placeholder]="item.title" name="comment{{i}}" [(ngModel)]="item.columnName"
                                 required pattern="^.{1,}$">
                                 <mat-option>
                                    <ngx-mat-select-search [(ngModel)]="columnFilter" [placeholderLabel]="'Search...'"
                                      [noEntriesFoundLabel]="'Not found'" name="columnFilter"></ngx-mat-select-search>
                                  </mat-option>
                                 <mat-option *ngFor="let excelColumn of excelColumnList | stringFilterBy:columnFilter:'columnName';  trackByProperty: 'columnName'"
                                    [value]="excelColumn.columnName">
                                    {{excelColumn.columnName}}
                                 </mat-option>
                              </mat-select>
                           </mat-form-field>
                        </div>
                        <div class="col-md-4 col-sm-12">
                           <span class="text-info">{{item.description}}</span>
                        </div>
                     </div>



                     <!-- <table class="w-100" >
                    <tr *ngFor="let item of columnList; let i = index">
                       <td class="w-md-25">
                         
                            <h5>{{item.title}}</h5>  
                          
                       </td>
                       <td class="w-md-25">
                         <mat-form-field>
                              <mat-select [placeholder]="item.title" name="comment{{i}}" [(ngModel)]="item.columnName"
                                 required pattern="^.{1,}$">
                                 <mat-option *ngFor="let excelColumn of excelColumnList"
                                    [value]="excelColumn.columnName">
                                    {{excelColumn.columnName}}
                                 </mat-option>
                              </mat-select>
                           </mat-form-field>
                       </td>
                       <td class="d-sm-none">
                          <span class="text-info">{{item.description}}</span>
                       </td>
                    </tr>
                 </table> -->
                  </div>
                  <div class="card-footer">
                     <button type="button" class="btn btn-danger pull-left" (click)="reset()">Choose Other File</button>
                     <button type="button" class="btn btn-danger pull-right" (click)="doImport()"
                        [disabled]="!form.valid">Import</button>
                  </div>
               </div>
            </form>
         </div>
        
      </div>
   </div>
</div>
