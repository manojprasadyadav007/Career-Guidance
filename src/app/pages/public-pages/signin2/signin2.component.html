<div *ngIf="showLoader" class="spinner_circel">
	<mat-progress-spinner mode="indeterminate"> </mat-progress-spinner>
 </div>
<div class="singin2">
	<div style="background-color:#EC3136;width:100%;">
		<div class="container h-100 px-3" style="padding: 20px 0px;">
			<div class="row align-items-center h-100">
				<div class="col-3 mx-auto" style="text-align:left;">
					<a href="#"><img src="./assets/img/MyMSM_logo_1.png" style="width:100%;max-width:100px;" alt="logo"
							loading="lazy"></a>
				</div>
				<div class="col-9 mx-auto" style="text-align:right;">
					<ul class="mainnav">
						<!-- <li>
							<a href="https://msquaremedia.com/">Home</a>
						</li> -->
					</ul>
				</div>
			</div>
		</div>
	</div>

	<div style="width:100%;;">
		<div class="container h-100" style="max-width:1040px;">
			<div class="row align-items-center h-100" style="min-height:calc(100vh - 118.43px)">
				<div class="col-12 col-sm-6 mx-auto" style="text-align:left;">
					<img src="https://msquaremedia.com/wp-content/uploads/2020/06/LOGIN-PAGE2-1024x804.png"
						style="width:100%;" alt="sideimage" loading="lazy">
				</div>
				<div class="col-12 col-sm-6 mx-auto" style="text-align:left;padding:20px;">
					<h1 style="color:#E92429;font-weight:700;font-size:24px;margin-bottom:20px;line-height: 1.2;">
						Login
					</h1>
					<form #form="ngForm" style="margin-bottom: 0px;" (submit)="onSubmit(form)">
						<div class="fieldcont">
							<input type="text" class="loginfield form-control" placeholder="Email" #UserName="ngModel"
								[(ngModel)]="formdata.UserName" name="UserName" required maxlength="100"
								[pattern]="modelPattern.email">

						</div>
						<div class="fieldcont" *ngIf="form.submitted && UserName.hasError('required')">
							<span class="error">Email id is required</span>
						</div>

						<div class="fieldcont" *ngIf="UserName.touched && UserName.hasError('pattern')">
							<span class="error">Enter valid Email id</span>
						</div>
						<div class="fieldcont">
							<input type="password" class="loginfield form-control" placeholder="Password"
								#Password="ngModel" [(ngModel)]="formdata.Password" name="Password" required
								maxlength="50">
						</div>
						<div class="fieldcont" *ngIf="form.submitted && Password.hasError('required')">
							<span class="error">Password is required</span>
						</div>
						<div class="fieldcont">
							<label>
								<input type="checkbox" name="addremembermevariable" (change)="checkValue()"
									[(ngModel)]="remember" class="loginbox">
								<span class="formlabel">Remember me</span>
							</label>
							<span style="color:#4a4a4a;"> | </span>
							<label>
								<a href="#/forgot-password" class="loginlink">Forgot Password</a>
							</label>
						</div>
						<ng-container *ngIf="!showcaptcha">
							<div class="fieldcont">
								<re-captcha #captcha="ngModel" ngModel name="captcha" required>
								</re-captcha>
							</div>
							<div class="fieldcont" *ngIf="form.submitted && captcha.hasError('required')">
								<span class="error">Please solve captcha</span>
							</div>
						</ng-container>
						<div class="fieldcont">
							<input type="submit" class="loginfield" value="Login">
						</div>
						<div class="fieldcont" *ngIf="expiredMessage">
							<span class="error"> {{expiredMessage}}</span>
						</div>
						<div class="fieldcont" *ngIf="loginerror">
							<span class="error" [innerHTML]="loginerror"> </span>
						</div>


					</form>

					<div class="separator" style="color: #4a4a4a;"> or </div>

					<p class="text-center font-weight-bold" style="color: #4a4a4a;"> Signin with Social Media</p>

					<div class="col d-flex justify-content-center">

						<button class="google" (click)="signInWithGoogle()" data-toggle="tooltip" title="Google">
							<span class="fab fab fa-google"></span> <span class="d-none" style="margin: -2px 5px;">
								Google</span>
						</button>

						<button class="fb" (click)="signInWithFB()" data-toggle="tooltip" title="Facebook">
							<span class="fab fab fa-facebook"></span> <span class="d-none" style="margin: -2px 5px;">
								Facebook</span>
						</button>

						<button  class="linkedin" (click)="signInWithLinkedIn()"  data-toggle="tooltip" title="LinkedIn">
							<span class="fab fab fa-linkedin"></span> <span class="d-none" style="margin: -2px 5px;">
								Linkedin</span>
						</button>

						<button class="microsoft" (click)="signInWithMicrosoft()" data-toggle="tooltip"
							title="Microsoft">
							<span class="fab fab fa-microsoft"></span> <span class="d-none" style="margin: -2px 5px;">
								Microsoft</span>
						</button>

						<!-- <button  class="twitter" (click)="signInWithTwitter()" data-toggle="tooltip" title="Twitter">
							<span class="fab fab fa-twitter"  ></span> <span class="d-none" style="margin: -2px 5px;"> Twitter</span>
						</button> -->

					</div>

					<div>
						<span
							style="width:100%;background-color:#FFCFD0;height:1px;margin:20px 0px;display:inline-block;"></span>
					</div>
					<h2 style="color:#E92429;font-weight:700;font-size:20px;margin-bottom:20px;text-align:center;">
						Don't have an account?
					</h2>
					<div class="text-center">
						<a routerLink="/signup/agent" class="buttons">Register as Agent/Institution</a>
					</div>
				</div>
			</div>
		</div>
	</div>

					<i class="fa fa-instagram"></i>				</a>

					<i class="fa fa-youtube"></i>				</a>
