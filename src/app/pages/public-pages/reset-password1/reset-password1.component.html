<div class="singin2">
	<div style="background-color:#EC3136;width:100%;">
		<div class="container h-100 px-3" style="padding: 20px 0px;">
			<div class="row align-items-center h-100">
				<div class="col-3 mx-auto" style="text-align:left;">
					<a href="#"><img src="./assets/img/MyMSM_logo_1.png" style="width:100%;max-width:100px;"
							alt="logo"></a>
				</div>
				<div class="col-9 mx-auto" style="text-align:right;">
					<ul class="mainnav">
						<!-- <li>
							<a href="https://msquaremedia.com/">Home</a>
						</li> -->
					</ul>
				</div>
			</div>
		</div>
	</div>

	<div style="width:100%;;">
		<div class="container h-100" style="max-width:1040px;">
			<div class="row align-items-center h-100" style="min-height:calc(100vh - 118.43px)">
				<div class="col-12 col-sm-6 mx-auto" style="text-align:left;">
					<img src="https://msquaremedia.com/wp-content/uploads/2020/06/LOGIN-PAGE2-1024x804.png"
						style="width:100%;" alt="sideimage">
				</div>
				<div class="col-12 col-sm-6 mx-auto" style="text-align:left;padding:20px;">
					<h1 style="color:#E92429;font-weight:700;font-size:24px;margin-bottom:20px;line-height: 1.2;">
						Reset Password
					</h1>
					<form #form="ngForm" style="margin-bottom: 0px;" (submit)="doResetPassword()">
						<div class="fieldcont">
							<input type="password" class="loginfield form-control" placeholder="New Password"
								#NewPassword="ngModel" [(ngModel)]="formdata.NewPassword" name="NewPassword" required
								minlength="3" maxlength="50">

						</div>
						<div class="fieldcont">
							<input type="password" class="loginfield form-control" placeholder="Confirm Password"
								#ConfirmPassword="ngModel" [(ngModel)]="confirmPassword" name="ConfirmPassword" required
								minlength="3" maxlength="50" [appConfirmPassword]="formdata.NewPassword">
						</div>
						<div class="fieldcont">
							<input type="submit" class="loginfield" value="Reset" [disabled]="form.invalid">
						</div>
						<div class="fieldcont" *ngIf="loginerror">
							<span class="error"> {{loginerror}}</span>
						</div>
						<div class="fieldcont" *ngIf="NewPassword.touched && NewPassword.hasError('required')">
							<span class="error">New password is required</span>
						</div>

						<div class="fieldcont"
							*ngIf="NewPassword.touched && (NewPassword.hasError('minlength') || NewPassword.hasError('maxlength'))">
							<span class="error">Enter valid password</span>
						</div>

						<div class="fieldcont" *ngIf="ConfirmPassword.touched && ConfirmPassword.hasError('required')">
							<span class="error">Confirm password is required</span>
						</div>
						<div class="fieldcont"
							*ngIf="ConfirmPassword.touched && ConfirmPassword.hasError('ConfirmPassword') && !ConfirmPassword.hasError('required')">
							<span class="error">Confirm password not matched with new password</span>
						</div>

					</form>
				</div>
			</div>
		</div>
	</div>

	<div style="background-color:#EC3136;width:100%;color:#fff;">
		<div class="container h-100" style="padding: 20px 0px;">
			<div class="row align-items-center h-100">
				<div class="col-12 col-sm-6 mx-auto" style="text-align:center;font-size:12px;">
					Copyright © 2020 M Square Media | All Rights Reserved
				</div>

			</div>
		</div>
	</div>


</div>
