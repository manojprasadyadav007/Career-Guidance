<div class="main-content">
  <div class="card" *ngIf="permission>0">
    <div class="card-body">
      <dx-data-grid [dataSource]="dataList" [showBorders]="true" [allowColumnResizing]="true" [showColumnLines]="true"
        [showRowLines]="true" [rowAlternationEnabled]="true" [noDataText]="gridMessage" [columnAutoWidth]="true"
        (onToolbarPreparing)="onToolbarPreparing($event)" [allowColumnReordering]="true" (onExporting)="activitylog()"
        >
        <dxo-filter-panel [visible]="true"></dxo-filter-panel>


        <dxo-paging [enabled]="true" [pageSize]="10"></dxo-paging>
        <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[5, 10, 25,50,100]" [showInfo]="true">
        </dxo-pager>
        <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>

        <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>

        <dxo-export [enabled]="excel_permisson > 0" fileName="Retrieve Deleted Application"></dxo-export>

        <dxo-column-chooser [enabled]="true" mode="select" [allowSearch]="true">
        </dxo-column-chooser>

        <!-- <dxo-scrolling mode="virtual"></dxo-scrolling> -->

        <dxi-column *ngFor="let item of columns" [dataField]="item.dataField"  [caption]="item.title | sentenceCase"
          [dataType]="item.type" [format]="item.format">
        </dxi-column>

        <dxi-column caption="Retrieve" [allowExporting]="false" [fixed]="true" fixedPosition="right" [minWidth]="50" cellTemplate="actionCellTemplate" *ngIf="permission>1" >
        </dxi-column>

        <div *dxTemplate="let d of 'actionCellTemplate'">
          <button mat-icon-button type="button" class="text-info"
            (click)="retrieve(d.data.DeleteId,d.data.ApplicationId)" *ngIf="permission>1">
            <mat-icon data-toggle="tooltip" title="Retrieve">undo</mat-icon>
          </button>
        </div>
        
        <div *dxTemplate="let d of 'toolbarButton'">
          <button class="text-danger" (click)="showFilterRow=!showFilterRow" mat-icon-button data-toggle="tooltip" title="Apply Filter">
            <mat-icon>filter_list</mat-icon>
        </button>
        </div>

      </dx-data-grid>
    </div>
  </div>
</div>

<!-- Script For Tooltip -->
<script>
  $(document).ready(function () {
    $('[data-toggle="tooltip"]').tooltip();
  });
</script>
