<mat-form-field>
    <mat-label>{{placeholder}}</mat-label>
    <mat-select matInput [(ngModel)]="value" required="{{required}}" disabled="{{disabled}}" [MinValue]="minHours">
        <!-- <mat-option>None</mat-option> -->
        <mat-option [value]="item" *ngFor="let item of hours" [disabled]="+item<minHours">{{item}}</mat-option>
    </mat-select>
    <mat-error *ngIf="!value">Enter valid {{placeholder | lowercase}}</mat-error>
    
</mat-form-field>
